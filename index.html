<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="数脉 ShuMai · 中考数学智能学习系统，涵盖624道真题、500道基础练习、23种解题方法" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#040810" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="数脉" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <title>数脉 ShuMai · 中考数学</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #040810; color: #dce8f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-tap-highlight-color: transparent; -webkit-text-size-adjust: 100%; }
      #root { min-height: 100vh; min-height: 100dvh; }
      /* 安全区域适配（刘海屏） */
      @supports (padding: env(safe-area-inset-top)) {
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
      }
      /* 移动端触摸与滚动优化 */
      button, [role="button"] { min-height: 44px; touch-action: manipulation; }
      input, select, textarea { font-size: 16px; /* 防止 iOS 自动缩放 */ }
      * { -webkit-overflow-scrolling: touch; scrollbar-width: thin; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #1a2d44; border-radius: 4px; }
      /* J3 题库防盗版 — 禁止选择/复制题目内容 */
      .q-content { user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // 注册 Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
