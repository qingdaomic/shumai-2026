",x:420,y:400,fivePoints:["概念：正视图、侧视图、俯视图","常例：圆柱正视图是矩形，俯视图是圆","特例：球的三视图都是等圆","反例：三视图确定几何体形状，但不能确定大小（需尺寸）","考察：由实物画三视图，或由三视图还原实物"],keys:["正视图：从正面看（主视图）","侧视图：从左面或右面看","俯视图：从上面看（最常用）","三视图对应关系：正视图与侧视图等高，正视图与俯视图等宽","常见几何体三视图：棱柱、棱锥、圆柱、圆锥、球"],tips:"画三视图口诀：正左同高，正俯同宽，左俯同深。遇到不规则组合体，先分解成基本几何体再分别画。",pre:["solid_geo"],rel:["solid_vol"],examYears:[2017,2019,2020,2021,2022,2023,2024,2025],totalScore:18,freq:75,diff:2,methods:["m13","m18"],basicsCount:16,groupCount:1,finalCount:0},{id:"polygon_angle",name:"多边形内外角和",semester:"8b",chapter:"ch_8b_6",domain:"geometry",x:530,y:580,fivePoints:["概念：多边形内角和与边数的关系","常例：六边形内角和=(6-2)×180°=720°","特例：任意多边形外角和恒为360°","反例：正多边形每个内角=(n-2)×180°/n，不是180°/n","考察：已知内角和求边数，已知一内角求边数"],keys:["n边形内角和=(n-2)×180°","任意多边形外角和=360°（与边数无关）","正n边形每个内角=(n-2)×180°/n","正n边形每个外角=360°/n","由内角和反求边数：n=(内角和/180°)+2"],tips:"外角和恒为360°是解题神器：不管几边形，所有外角加起来都是360°。知道正多边形一个外角就能求边数：n=360°÷外角度数。",pre:["parallel_proof","tri_basic"],rel:["quadrilateral","similar"],examYears:[2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025],totalScore:15,freq:78,diff:2,methods:["m09","m20","m13"],basicsCount:16,groupCount:1,finalCount:0},{id:"midline",name:"三角形中位线",semester:"8b",chapter:"ch_8b_6",domain:"geometry",x:640,y:580,fivePoints:["概念：连接三角形两边中点的线段","常例：DE是△ABC中位线（D、E分别是AB、AC中点），则DE∥BC，DE=BC/2","特例：三角形有三条中位线，围成的小三角形面积是原三角形的1/4","反例：中位线平行于第三边，不是平行于两腰","考察：中位线定理证明、与平行四边形结合"],keys:["中位线定理：中位线平行于第三边且等于其一半","逆定理：平行且等于第三边一半的线段是中位线","三条中位线将三角形分成4个全等的小三角形","梯形中位线：平行两底，长度等于两底之和的一半","常与平行四边形判定结合：中点连线构成平行四边形"],tips:"中位线定理和相似是好搭档：中位线把三角形分成相似比为1:2的两个三角形。梯形中位线=（上底+下底）/2，与三角形中位线公式要区分记忆。",pre:["congruent","parallel_lines"],rel:["quadrilateral","similar","polygon_angle"],examYears:[2016,2017,2019,2020,2021,2022,2023,2024],totalScore:20,freq:72,diff:3,methods:["m07","m08","m04"],basicsCount:14,groupCount:2,finalCount:0},{id:"pythagorean_inv",name:"勾股定理逆定理",semester:"8a",chapter:"ch_8a_1",domain:"geometry",x:90,y:700,fivePoints:["概念：满足a²+b²=c²的三角形是直角三角形","常例：三边为5、12、13，因5²+12²=13²，是直角三角形","特例：判断直角在最大边所对的 ","去绝对值：分a≥0和a<0两种情况讨论"],tips:"去绝对值必须分情况：|2x-1|这类题，令2x-1≥0和2x-1<0分别讨论。|a|=b（b>0）等价于a=b或a=-b，这是绝对值方程的标准解法。",pre:["rational","number_line"],rel:["inequality","reals"],examYears:[2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025],totalScore:15,freq:75,diff:2,methods:["m19","m14","m13"],basicsCount:16,groupCount:1,finalCount:0},{id:"algebra_expr",name:"代数式",semester:"7a",chapter:"ch_7a_3",domain:"algebra",x:310,y:100,fivePoints:["概念：用字母表示数的式子","常例：3a+2b，x²-1，πr²","特例：单独一个字母或数字也是代数式","反例：含等号或不等号的不是代数式（那是方程或不等式）","考察：列代数式、代数式求值、探索规律"],keys:["代数式的书写：数字在字母前，省略乘号","代数式求值：将数值代入字母计算","列代数式：将文字叙述翻译成代数式","代数式的值：与字母取值有关","探索规律：找通项公式（常用n表示第n项）"],tips:"代入求值时，负数必须加括号！如a=-2，则a²=(-2)²=4，不是-4。列代数式时，'比a多3'是a+3，'a的3倍少2'是3a-2，注意顺序。",pre:["rational"],rel:["poly","linear_eq","fn_concept"],examYears:[2015,2016,2017,2018,2019,2020,2021,2022,2023,2024],totalScore:12,freq:68,diff:1,methods:["m20","m09","m13"],basicsCount:15,groupCount:1,finalCount:0},{id:"sci_notation",name:"科学记数法",semester:"7a",chapter:"ch_7a_6",domain:"algebra",x:420,y:100,fivePoints:["概念：a×10ⁿ的形式，1≤|a|<10","常例：3.8×10⁵=380000；4.2×10⁻³=0.0042","特例：n为负数时表示小于1的小数","反例：38×10⁴不是科学记数法（a=38不满足条件）","考察：大数/小数互换、科学记数法大小比较"],keys:["大数转换：小数点左移，n为正整数（移动位数）","小数转换：小数点右移，n为负整数","n的确定：原数整数部分位数减1","科学记数法比较大小：先比n，n大则数大","有效数字：a中所有数字都是有效数字"],tips:"记忆口诀：大数（绝对值≥10）指数为正，小数（绝对值<1）指数为负。n=移动小数点的位数（大数左移取正，小数右移取负）。",pre:["rational"],rel:["approx_num","reals"],examYears:[2015,2017,2018,2019,2020,2021,2022,2023,2024,2025],totalScore:12,freq:72,diff:1,methods:["m13","m19"],basicsCount:14,groupCount:0,finalCount:0},{id:"power_rules",name:"幂的运算法则",semester:"7b",chapter:"ch_7b_1",domain:"algebra",x:530,y:100,fivePoints:["概念：同底数幂、幂的乘方、积的乘方的运算规律","常例：a³×a²=a⁵；(a²)³=a⁶；(ab)³=a³b³","特例：a⁰=1（a≠0）；a⁻¹=1/a","反例：a²×b²≠(ab)⁴，底数不同不能直接合并指数","考察：化简含幂的代数式，与科学记数法结合"],keys:["同底数幂相乘：aᵐ×aⁿ=aᵐ⁺ⁿ（底数不变，指数相加）","幂的乘方：(aᵐ)ⁿ=aᵐⁿ（底数不变，指数相乘）","积的乘方：(ab)ⁿ=aⁿbⁿ（每个因数都要乘方）","同底数幂相除：aᵐ÷aⁿ=aᵐ⁻ⁿ（a≠0）","零指数与负指数：a⁰=1，a⁻ⁿ=1/aⁿ（a≠0）"],tips:"三条法则的关键词：同底相乘→指数加；乘方→指数乘；积的乘方→分配进去。最容易混的是(a²)³=a⁶（乘）和a²×a³=a⁵（加），要靠关键词区分。",pre:["rational","algebra_expr","poly"],rel:["poly","factoring","sci_notation"],examYears:[2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025],totalScore:15,freq:75,diff:2,methods:["m06","m23","m13"],basicsCount:18,groupCount:2,finalCount:0},{id:"variable_intro",name:"变量与函数初步",semester:"7b",chapter:"ch_7b_6",domain:"algebra",x:640,y:100,fivePoints:["概念：变量是可以取不同数值的量","常例：汽车行驶时间t与路程s的关系：s=60t","特例：自变量变化时，因变量随之变化","反例：常量不是变量（圆周率π不是变量）","考察：从表格/图像/关系式中读取变量关系"],keys:["自变量：可以自由取值的变量","因变量：随自变量变化而变化的量","三种表示方法：表格法、关系式法、图像法","从图像读信息：增减趋势、最大最小值、特殊点","实际问题中识别自变量和因变量"],tips:"三种表示方法各有优势：表格直观但不完整，关系式精确但抽象，图像形象但读数有误差。中考常考从折线图读数据，注意横纵轴的含义和单位。",pre:["algebra_expr","rational"],rel:["fn_concept","linear_fn","stats"],examYears:[2015,2017,2018,2019,2020,2021,2022,2023,2024],totalScore:9,freq:58,diff:1,methods:["m17","m21","m09"],basicsCount:12,groupCount:1,finalCount:0},{id:"fn_concept",name:"函数概念",semester:"8a",chapter:"ch_8a_4",domain:"algebra",x:750,y:100,fivePoints:["概念：一个变量的每个值对应另一个变量唯一确定的值","常例：y=2x+1，每个x对应唯一的y","特例：y=±√x不是函数（一个x对应两个y）","反例：x=3（竖线）不是函数，不满足唯一性","考察：判断是否是函数、自变量取值范围"],keys:["函数定义：x的每个值对应y的唯一值","自变量取值范围：使函数有意义的x的集合","分式：分母≠0；根式：被开方数≥0","函数值：将x代入解析式得到的y值","竖线检验：图像上每条竖线最多交一点→是函数"],tips:"自变量范围三类限制：①分母≠0②偶次根号下≥0③实际问题的限制（如长度>0）。多个限制同时满足取交集。这是每年必考的填空题。",pre:["variable_intro","linear_eq","algebra_expr"],rel:["linear_fn","inverse_fn","quad_fn"],examYears:[2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025],totalScore:15,freq:78,diff:2,methods:["m21","m19","m13"],basicsCount:16,groupCount:1,finalCount:0},{id:"eq_app",name:"方程应用题",semester:"7a",chapter:"ch_7a_5",domain:"algebra",x:530,y:160,fivePoints:["概念：将实际问题转化为方程模型求解","常例：行程问题、工程问题、配比问题","特例：追及问题：相同时间，路程差=速度差×时间","反例：设未知量要选最方便的，不一定设题目问的量","考察：读题建模是核心难点，计算反而简单"],keys:["行程问题：速度×时间=路程，相遇/追及分情况","工程问题：效率×时间=工作量，总量设为1","浓度问题：溶质=溶液×浓度，混合前后溶质守恒","利润问题：利润=售价-成本，利润率=利润/成本","数字问题：两位数=10×十位+个位"],tips:"应用题万能三步：①设未知量（写单位）②找等量关系（题目中'相等'的两个量）③列方程解答验证。等量关系是关键，常见的有：路程相等、工作量相等、总价相等。",pre:["linear_eq"],rel:["equations","fraction_eq_app","quad_eq_app"],examYears:[2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025],totalScore:24,freq:85,diff:3,methods:["m20","m17","m19"],basicsCount:20,groupCount:3,finalCount:0},{id:"quad_eq_app",name:"二次方程应用题",semester:"9a",chapter:"ch_9a_2",domain:"algebra",x:640,y:160,fivePoints:["概念：建立一元二次方程解决实际问题","常例：面积问题、利润最大化、数字问题","特例：解方程后必须检验是否符合实际（舍去负数解）","反例：两个解都要验证实际意义，不能直接取正数","考察：建模→解方程→验证→答题"],keys:["面积问题：长×宽=面积，设边长为x","增长率问题：原值×(1+r)²=新值","数字问题：设连续整数为n,n+1或n-1,n,n+1","几何问题：勾股定理建立方程","验根：代回原题检验，舍去不合实际的解"],tips:"增长率模型是固定套路：连续增长两次→乘(1+r)²。解出来的r如果是负数，表示下降率，要结合题意判断取舍。验根不只是验方程，还要验实际意义。",pre:["quad_eq","eq_app"],rel:["quad_fn_app","fraction_eq_app"],examYears:[2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025],totalScore:24,freq:82,diff:3,methods:["m20","m11","m19"],basicsCount:18,groupCount:3,finalCount:0},{id:"quad_fn_app",name:"二次函数应用题",semester:"9b",chapter:"ch_9b_2",domain:"algebra",x:750,y:160,fivePoints:["概念：用二次函数模型解决最值问题","常例：最大利润、最大面积、最远射程","特例：顶点即最值点，需判断顶点是否在定义域内","反例：定义域受限时，最值可能在端点而非顶点","考察：建立函数解析式→求顶点→结合实际取值"],keys:["建模：设自变量x，建立y=ax²+bx+c","顶点坐标：x=-b/2a，y=（代入求）","a>0时顶点为最小值，a<0时为最大值","定义域限制：顶点不在范围内时取端点最值","常见模型：利润=（售价-成本）×销量，面积=长×宽"],tips:"解题四步：①设x（通常是价格或数量）②建y=f(x)（利润/面积/距离）③求顶点x=-b/2a④判断是否在实际范围内。最大面积题常用'设一边为x，另一边用x表示'来建模。",pre:["quad_fn","quad_eq_app"],rel:["inverse_fn"],examYears:[2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025],totalScore:30,freq:88,diff:4,methods:["m21","m05","m01","m19"],basicsCount:16,groupCount:3,finalCount:2},{id:"fraction_eq_app",name:"分式方程应用题",semester:"8b",chapter:"ch_8b_5",domain:"algebra",x:310,y:160,fivePoints:["概念：实际问题建立分式方程求解","常例：工程问题（合作效率）、行程问题（速度=路程/时间）","特例：分式方程必须验根，增根使分母为零","反例：验根不只验方程，还要验实际意义（时间不能为负）","考察：建模→去分母→解方程→验根→答题"],keys:["工程问题：1/a+1/b=1/t（各自效率之和=合作效率）","行程问题：路程÷速度=时间，相遇/追及建等量关系","顺逆流问题：顺流速度=船速+水速，逆流=船速-水速","增根判断：将可能的增根代入分母，使分母=0则舍去","验根步骤：代回原方程验证，再验实际意义"],tips:"分式方程应用题的等量关系通常是'时间相等'或'效率相等'。工程题设完工时间为x，则效率=1/x，两人合作效率=1/a+1/b，令其等于1/总时间列方程。",pre:["fraction","eq_app"],rel:[" cs:["rational"],methods:["m13"],content:"|-3|+(-2)²",answer:"7",sol:"①|-3|=3；②(-2)²=4；③3+4=7",error:"绝对值和乘方计算"},{id:48,yr:2020,no:12,city:"北京",type:"fill",topic:"quad_fn",score:3,diff:3,subTopics:["quad_fn","linear_fn"],methods:["m05","m22"],content:"抛物线y=ax²+bx+c的对称轴x=2，过点(0,1)，a的符号决定开口，∠若图像开口向下且顶点在第一象限，a和顶点纵坐标的符号",answer:"a<0，顶点纵坐标>0",sol:"开口向下a<0；第一象限顶点：x=2>0，y>0",error:"开口方向与a的关系"},{id:49,yr:2021,no:8,city:"北京",type:"choice",topic:"circle",score:3,diff:3,subTopics:["circle"],methods:["m07"],content:"⊙O，∠AOB=100°，C在优弧AB上，∠ACB=？",answer:"130°",sol:"①优弧所对圆周角=（360°-100°)/2=130°；②选130°",error:"优弧和劣弧的圆周角区别"},{id:50,yr:2022,no:4,city:"北京",type:"choice",topic:"factoring",score:3,diff:2,subTopics:["factoring","poly"],methods:["m06"],content:"分解：3x²-3",answer:"3(x+1)(x-1)",sol:"①提公因式3：3(x²-1)；②再用平方差：3(x+1)(x-1)",error:"先提公因式"},{id:51,yr:2023,no:7,city:"北京",type:"choice",topic:"quadrilateral",score:3,diff:2,subTopics:["quadrilateral","congruent"],methods:["m08"],content:"正方形边长2，对角线长=？",answer:"2√2",sol:"①正方形对角线=边×√2；②=2×√2=2√2；③勾股定理：d²=2²+2²=8，d=2√2",error:"正方形对角线=边×√2"},{id:52,yr:2024,no:3,city:"北京",type:"choice",topic:"prob",score:3,diff:2,subTopics:["prob"],methods:["m09"],content:"掷一枚均匀骰子，出现奇数的概率",answer:"1/2",sol:"①奇数1,3,5共3种，总6种；②选1/2",error:"均匀骰子等可能"},{id:53,yr:2025,no:9,city:"北京",type:"fill",topic:"trig",score:3,diff:2,subTopics:["trig"],methods:["m16"],content:"△ABC，∠C=90°，AB=10，sinA=3/5，BC=？AC=？",answer:"BC=6，AC=8",sol:"BC=AB×sinA=6；AC=8",error:"sin=对/斜"},{id:54,yr:2015,no:2,city:"上海",type:"choice",topic:"reals",score:3,diff:1,subTopics:["reals"],methods:["m13"],content:"√5的整数部分是？",answer:"2",sol:"2²=4<5<9=3²，所以2<√5<3，整数部分=2",error:"估算平方根"},{id:55,yr:2016,no:5,city:"上海",type:"choice",topic:"linear_fn",score:3,diff:2,subTopics:["linear_fn","inequality"],methods:["m21","m22"],content:"y=2x-4，使y>0的x的范围",answer:"x>2",sol:"①令y>0：2x-4>0；②解2x>4；③x>2，即x∈(2,+∞)时图像在x轴上方",error:"一次函数与不等式"},{id:56,yr:2017,no:4,city:"上海",type:"choice",topic:"congruent",score:3,diff:2,subTopics:["congruent","tri_basic"],methods:["m07"],content:"以下不能判定三角形全等的是？A.SSS B.SAS C.SSA D.ASA",answer:"C（SSA）",sol:"①全等判定条件：SSS/SAS/ASA/AAS/HL；②SSA(两边及非夹角)不能判定全等；③反例：两个不同三角形可满足SSA",error:"SSA有反例"},{id:57,yr:2018,no:3,city:"上海",type:"choice",topic:"stats",score:3,diff:1,subTopics:["stats"],methods:["m09"],content:"数据2,3,4,5,6的平均数和方差",answer:"均值=4，方差=2",sol:"均值=4；方差=[(−2)²+(−1)²+0²+1²+2²]/5=2",error:"方差公式"},{id:58,yr:2019,no:6,city:"上海",type:"choice",topic:"inverse_fn",score:3,diff:2,subTopics:["inverse_fn","coords"],methods:["m21","m22"],content:"y=-2/x，图像在哪些象限？",answer:"第二、四象限",sol:"①y=k/x中k<0→图像在第二、四象限；②k=-2<0→二四象限；③各支上y随x增大而增大",error:"k的符号决定象限"},{id:59,yr:2020,no:8,city:"上海",type:"choice",topic:"quad_fn",score:3,diff:3,subTopics:["quad_fn"],methods:["m01","m22"],content:"y=x²-4x+3，对称轴和最小值",answer:"x=2，最小值=-1",sol:"①(x-2)²-1，顶点(2,-1)；②选x=2，最小值=-1",error:"配方求顶点"},{id:60,yr:2021,no:4,city:"上海",type:"choice",topic:"pythagorean",score:3,diff:2,subTopics:["pythagorean"],methods:["m16"],content:"直角△两直角边5和12，斜边=？",answer:"13",sol:"①勾股定理：斜边²=5²+12²=25+144=169；②斜边=√169=13；③常见勾股数：3-4-5、5-12-13、8-15-17",error:"勾股数5-12-13"},{id:61,yr:2022,no:7,city:"上海",type:"choice",topic:"circle",score:3,diff:2,subTopics:["circle"],methods:["m07"],content:"⊙O中，AB是弦，OC⊥AB于C，OA=5，OC=3，AB=？",answer:"AB=8",sol:"AC=√(25-9)=4；AB=8",error:"弦心距求弦长"},{id:62,yr:2023,no:5,city:"上海",type:"choice",topic:"transform",score:3,diff:2,subTopics:["transform","coords"],methods:["m16","m18"],content:"△ABC顶点A(0,0)，B(2,0)，C(0,2)，关于y轴对称得△A'B'C'，B'=？",answer:"B'(-2,0)",sol:"①关于y轴对称：x取相反数，y不变；②B(2,0)→B'(-2,0)；③A(0,0)不变，C(0,2)不变",error:"y轴对称规则"},{id:63,yr:2024,no:3,city:"上海",type:"choice",topic:"quad_eq",score:3,diff:2,subTopics:["quad_eq","factoring"],methods:["m06"],content:"x²+x-6=0的两根",answer:"x=2或x=-3",sol:"①x²+x-6=0，找两数积=-6且和=1→3和-2；②(x+3)(x-2)=0；③x=-3或x=2",error:"十字相乘"},{id:64,yr:2025,no:6,city:"上海",type:"choice",topic:"similar",score:3,diff:2,subTopics:["similar"],methods:["m04"],content:"△ABC，DE∥BC，AD=3，AB=9，△AD BC，AB=AC，∠BAC=90°，D是BC上一点，DE⊥AB于E，DF⊥AC于F，证：△BDE≅△DCF",answer:"AAS：∠B=∠DCF=45°，∠BED=∠DFC=90°，BD=DC（等腰直角△三线合一）",sol:"△ABC等腰直角→∠B=∠C=45°；BD=DC（D为BC中点，因为△ABC等腰直角）；AAS",error:"等腰直角三角形的特殊性质"},{id:319,yr:2021,no:19,city:"青岛",type:"solve",topic:"similar",score:10,diff:4,subTopics:["similar","quadrilateral","coords"],methods:["m04","m15","m16"],content:"梯形ABCD，AD∥BC，∠B=90°，BC=4，AB=3，CD=5，E是CD的中点，AE=？△ABE∽？",answer:"AE=√(（AB²+BE²）=√(9+（2²+4²）=√(9+20）=√29）？需坐标建模",sol:"建坐标：B(0,0)，C(4,0)，A(0,3)；CD=5，D坐标需求；E为CD中点",error:"梯形坐标建模"},{id:320,yr:2022,no:21,city:"青岛",type:"solve",topic:"circle",score:10,diff:4,subTopics:["circle","similar","trig"],methods:["m07","m04","m03"],content:"⊙O，PA切⊙O于A，PO=10，OA=6，B是PO与圆的另一交点，求PA和△OAB的面积",answer:"PA=8，S△OAB=24/5",sol:"PA=√(100-36)=8；OB=R=6；PB=PO-OB=4；S△PAB=½×PA×OA×sinA?；用面积法：S△OAB=½×OA×h，h=PA×OB/PO",error:"切线与弦的面积计算"},{id:321,yr:2023,no:21,city:"青岛",type:"solve",topic:"quadrilateral",score:10,diff:4,subTopics:["quadrilateral","similar","congruent"],methods:["m08","m04","m15"],content:"矩形ABCD，AB=3，BC=4，E在AB上AE=1，F是DE与BC延长线的交点，△DEA∽△FEB？求CF",answer:"△DEA∽△FEB（AA）；DE/FE=EA/EB=1/2；相似比1:2；CF=BC-BF=4-2=2",sol:"∠DEA=∠FEB（对顶角）；∠A=∠B=90°→AA相似；EA=1，EB=2，相似比1:2；BF=2；CF=4-2... 需要重新分析图形",error:"矩形中的相似三角形"},{id:322,yr:2024,no:21,city:"青岛",type:"solve",topic:"quad_fn",score:12,diff:5,subTopics:["quad_fn","linear_fn","similar","coords"],methods:["m01","m04","m22","m16"],content:"y=x²-2x-3，A(-1,0)，B(3,0)，顶点C，P在AB上，Q在BC的延长线上，∠PAQ=∠BAC，PA=AQ，求Q坐标",answer:"需旋转变换或对称法分析",sol:"C(1,-4)；∠PAQ=∠BAC且PA=AQ→△PAQ是以A为顶点的等腰△；利用旋转：Q是P关于AC对称或旋转的结果",error:"等腰三角形+旋转变换综合"},{id:323,yr:2018,no:14,city:"广州",type:"fill",topic:"quad_fn",score:4,diff:3,subTopics:["quad_fn","coords"],methods:["m01","m05"],content:"抛物线y=ax²-2ax+c（a≠0），顶点为(1,-3)，求a和c",answer:"a为任意非零数，c=a-3... 顶点纵=c-a=-3→c=a-3；任意a均可？应有更多条件。若过(0,1)：c=1，则a=4",answer:"若过原点：c=0→a=3；顶点(1,-3)✓",sol:"顶点x=-(-2a)/(2a)=1✓；y(1)=a-2a+c=c-a=-3；还需一个条件确定a",error:"顶点式确定参数需两个条件"},{id:324,yr:2019,no:15,city:"北京",type:"fill",topic:"circle",score:4,diff:3,subTopics:["circle","pythagorean"],methods:["m07","m16"],content:"⊙O，直径AB=10，C在圆上，BC=6，AC=？∠ACB=？",answer:"AC=8，∠ACB=90°",sol:"∠ACB=90°（直径所对）；AC=√(AB²-BC²)=√(100-36)=8",error:"直径所对圆周角=90°"},{id:325,yr:2020,no:16,city:"上海",type:"fill",topic:"stats",score:4,diff:3,subTopics:["stats"],methods:["m09"],content:"20个数据的均值=10，方差=4，其中10个数据均值=12，这10个数据的方差已知=5，另外10个数据的均值=？",answer:"另10个数据均值=8",sol:"①20×10=10×12+10×x→200=120+10x→x=8；②=另10个数据均值=8",error:"分组均值与总均值的关系"},{id:326,yr:2021,no:17,city:"深圳",type:"fill",topic:"similar",score:4,diff:3,subTopics:["similar","quadrilateral"],methods:["m04","m15"],content:"△ABC，D、E分别是AB、AC上的点，DE∥BC，△ADE面积=4，梯形BCED面积=12，DE:BC=？",answer:"DE:BC=1:2",sol:"△ADE面积:△ABC面积=4:16=1:4；相似比=1:2；DE:BC=1:2",error:"面积比→相似比→边长比"},{id:327,yr:2022,no:16,city:"成都",type:"fill",topic:"quad_eq",score:4,diff:3,subTopics:["quad_eq","factoring"],methods:["m11","m06"],content:"若x=2是方程x²+px+q=0的一个根，且另一个根也是整数，Δ=？另一根的可能值",answer:"Δ=(2+root)²-4q；需更多条件",sol:"2²+2p+q=0→2p+q=-4；若另一根r，由韦达：2+r=-p，2r=q；可能值不唯一",error:"韦达定理的逆用"},{id:328,yr:2023,no:18,city:"武汉",type:"fill",topic:"circle",score:4,diff:4,subTopics:["circle","similar","trig"],methods:["m07","m04"],content:"⊙O，AB为直径=10，C在圆上，sinC=3/5（∠ABC的对面），BC=？AC=？",answer:"BC=8，AC=6",sol:"∠ACB=90°；sinC不对，题意：sin∠B=AC/AB=3/5→AC=6；BC=8",error:"直角三角形中三角函数的对应"},{id:329,yr:2024,no:20,city:"浙江",type:"solve",topic:"quad_fn",score:10,diff:5,subTopics:["quad_fn","linear_fn","coords","similar"],methods:["m01","m22","m04","m16"],content:"y=x²-4x+3，A(1,0)，B(3,0)，顶点C，P在抛物线上（y<0部分），△PAB的面积最大时P坐标",answer:"P(2,-1)，面积=1",sol:"顶点C(2,-1)；P在[1,3]区间内，底AB=2，高=|y_P|；最大高度在顶点处|y|=1；S=½×2×1=1",error:"底固定求面积最大时高最大"},{id:330,yr:2025,no:21,city:"江苏",type:"solve",topic:"circle",score:10,diff:5,subTopics:["circle","congruent","trig","similar"],methods:["m07","m08","m03","m04"],content:"⊙O，PA切⊙O于A，PO⊥AB（AB为弦），PA=6，OA=r，PO=？OB=r，AB=？",answer:"PO=√(r²+36)；AB=2r-2r²/PO（需完整几何关系）",sol:"PA⊥OA（切线）；PO=√(PA²+OA²)=√(36+r²)；AB需要圆心到AB的距离",error:"切线+弦长综合计算"},{id:331,yr:2015,no:21,city:"全国",type:"solve",topic:"quadrilateral",score:10,diff:4,subTopics:["quadrilateral","similar","congruent"],methods:["m08","m04","m15"],content:"梯形ABCD，AD∥BC，E为CD中点，BE延长线交AD延长线于F，证△BCE≅△FDE，并求BF",answer:"△BCE≅△FDE（AAS）；BF=2BE",sol:"∠CBE=∠FDE（AD∥BC，错角）；∠BEC=∠DEF（对顶角）；CE=DE（E中点）→AAS；BF=BF=BE+EF=2BE（E中点）",error:"梯形中位线与全等"},{id:332,yr:2016,no:22,city:"全国",type:"solve",topic:"similar",score:10,diff:4,subTopics:["similar","pythagorean","circle"],methods:["m04","m07","m15"],content:"Rt△ABC，∠C=90°，AC=3，BC=4，⊙O以BC为直径，与AB交于D，求OD和AD",answer:"OD=2（半径），AD=9/5",sol:"AB=5；OB=OC=2（BC/2）；OD⊥AB？不一定；△ODB中OB=2，∠ODB=90°（直径所对）；AD=AB-DB；DB=AB×OB/AB...需仔细分析",error:"圆与直角三角形的综合"},{id:333,yr:2017,no:23,city:"全国",type:"solve",topic:"quad_fn",score:12,diff:5,subTopics:["quad_fn","linear_fn","coords","similar"],methods:["m01","m05","m04","m22"],content:"y=x²+bx+c，顶点在第三象限，对称轴x=-1，与y轴交点(0,c)，c<0，直线y=x+m与抛物线相切，求m",answer:"m=-1-（b+1）²/4... 相切Δ=0：(1-b)²-4(c-m)=0，m=(1-b)²/4+c-1...需具体b,c",sol:"对称轴x=-1→b=2；顶点在三象限→c<顶点纵坐标<0；相切：联立y=x+m和y=x²+2x+c→Δ=0",error:"直线与抛物线相切条件"},{id:334,yr:2018,no:22,city:"全国",type:"solve",topic:"circle",score:10,diff:5,subTopics:["circle","congruent","similar","trig"],methods:["m07","m08","m04"],content:"⊙O，直径CD，弦AB⊥CD于E，F是弧AC的中点，证BF∥CD并求BF（AB=2√3，R=2）",answer:"BF∥CD；BF=？",sol:"F是弧AC中点→AF=FC→∠AOF=∠COF；OA=OC=R；△AOF≅△COF；OF⊥AC；再证BF∥CD",error:"弧中点的对称性证明"},{id:335,yr:2019,no:24,city:"全国",type:"solve",topic:"quad_fn",score:12,diff:5,subTopics:["quad_fn","linear_fn","similar","coords"],methods:["m01","m04","m22","m16"],content:"y=ax²（a>0），A(-2,4a)在抛物线上，B(2,4a)，C是顶点O和A的连线与y轴的交点，△ABC的面积关于a的表达式",answer:"S△ABC=8a（面积随a变化）",sol:"O(0,0)，A(-2,4a)，B(2,4a)；OA直线y=(-2a)x；与y轴交点C=y轴→C(0,0)=O？重析：OA直线斜率=4a/(-2)=-2a；y=-2ax；C是与y轴的交点：x=0→y=0，即C=O原点，与O重合不合理。改：C为AB与y轴交点：AB是y=4a的水平线，与y轴交点C(0,4a)；S△OCB=½×2×4a=4a；S△OCA=4a；S△ABC=8a",error:"坐标系中三角形面积计算"},{id:336,yr:2023,no:22,city:"北京",type:"solve",topic:"similar",score:10,diff:4,subTopics:["similar","quadrilateral","pythagorean"],methods:["m04","m15","m16"],content:"△ABC，∠ACB=90°，AC=6，BC=8，D是AB上的点，CD⊥AB，CE平分∠ACB交AB于E，求DE",answer:"DE=AB/2-CD/tan45°... 需坐标法",sol:"AB=10；CD=4.8（射影定理）；CE是∠ACB=90°的平分线→CE平分直角；用坐标法计算DE",error:"角平分线与高的关系"},{id:337,yr:2023,no:24,city:"上海",type:"solve",topic:"quad_fn",score:12,diff:5,subTopics:["quad_fn","coords","linear_fn"],methods:["m01","m22","m21","m05"],content:"y=-x²+2x+3，A(-1,0)，B(3,0)，顶点P(1,4)，直线l过P，与x轴交于M，△AMB面积=2，求直线l方程",answer:"需设直线l:y=k(x-1)+4，令y=0求M，再由S△AMB=2解k",sol:"M是l与x轴的交点：令y=0→x=1-4/k；AM=|1-4/k-(-1)|=|2-4/k|；S=½×AM×4=2→AM=1→|2-4/k|=1→k=4或k=4/3",error:"参数化直线求面积"},{id:338,yr:2024,no:23,city:"广州",type:"solve",topic:"circle",score:10,diff:4,subTopics:["circle","similar","congruent"],methods:["m07","m08","m04"],content:"⊙O，AB为直径，C、D在圆上，AC=CD，证：AC²=AB·CE（E为BD延长线与AC的交点）",answer:"需相似三角形推导",sol:"AC=CD→弧AC=弧CD→∠ABC=∠CBD；∠ACB=90°；分析△ACE和△ABD的关系",error:"等弧等弦推导相似"},{id:339,yr:2024,no:24,city:"深圳",type:"solve",topic:"quad_fn",score:12,diff:5,subTopics:["quad_fn","linear_fn","coords","similar"],methods:["m01","m04","m22","m05"],content:"y=x²-2x-3，顶点C，A(-1,0)，B(3,0)，P是抛物线上一动点，当△PAB为直角三角形时，P坐标",answer:"多个解：P在AB上方y>0时无直角（抛物线在AB下），P在AB下方y<0",sol:"∠APB=90°用圆（以AB为直径的圆）；∠PAB=90°：P在过A垂直AB的直线上x=-1上；∠PBA=90°：x=3上",error:"直角三角形的多种情况"},{id:340,yr:2025,no:22,city:"成都",type:"solve",topic:"similar",score:10,diff:4,subTopics:["similar","quadrilateral","coords"],methods:["m04","m15","m16"],content:"平行四边形ABCD，AB=2，AD=3，∠A=60°，E是BC中点，AE=？△ABE∽△ADE的相似比",answer:"AE=√(AB²+BE²-2·AB·BE·cos∠ABE)=？",sol:"BE=BC/2=AD/2=3/2（平行四边形BC=AD）；∠ABE=∠ABC=120°（∠A+∠B=180°）；AE²=4+9/4-2×2×3/2×cos120°=4+2.25+3=9.25；AE=√37/2",error:"余弦定理在平行四边形中的应用"},{id:341,yr:2025,no:23,city:"武汉",type:"solve",topic:"circle",score:10,diff:5,subTopics:["circle","congruent","trig"],methods:["m07","m08","m03"],content:"⊙O，PA切⊙O于A，AB为弦，∠PAB=30°，AB=4，求⊙O半径R和PA",answer:"R=2√3，PA=4",sol:"弦切角∠PAB=30°=∠ACB（同弧AB）；设∠AOB=2×30°=60°（？需验证）；弦AB=2R×sin30°=R=4→R=4；重算：sin∠AOB/2=AB/(2R)；弦切角=所对弧的圆周角=∠AOB/2；∠PAB=30°→∠AOB=60°；AB=2Rsin30°=R=4；PA⊥OA，tan∠APO=R/ "choice",topic:"circle",score:3,diff:2,subTopics:["circle"],methods:["m07"],content:"⊙O，弦AB=6，半径=5，弦心距=？",answer:"4",sol:"①勾股定理：a²+b²=c²；②d²+3²=5²，d=4；③解得4",error:"弦心距"},{id:411,yr:2019,no:3,city:"广东",type:"choice",topic:"similar",score:3,diff:2,subTopics:["similar"],methods:["m04"],content:"△ABC，AB=4，BC=6，△A'B'C'∽△ABC，A'B'=6，B'C'=？",answer:"9",sol:"相似比=6/4=3/2；B'C'=9",error:"相似比的应用"},{id:412,yr:2015,no:12,city:"全国",type:"fill",topic:"quad_fn",score:4,diff:3,subTopics:["quad_fn","coords"],methods:["m01","m05"],content:"抛物线y=x²-4x+c与x轴相切（只有一个交点），c=？切点坐标=？",answer:"c=4，切点(2,0)",sol:"①计算判别式Δ=b²-4ac；②Δ=16-4c=0→c=4；x=2；③判断根的情况",error:"相切→Δ=0"},{id:413,yr:2016,no:14,city:"全国",type:"fill",topic:"circle",score:4,diff:3,subTopics:["circle","trig"],methods:["m07","m16"],content:"⊙O，半径=2，弦AB所对圆心角=90°，弦AB=？弧AB长=？",answer:"AB=2√2；弧长=π",sol:"AB=2×2×sin45°=2√2；弧长=90°/360°×2π×2=π",error:"弧长公式：弧长=(圆心角/360°)×2πR"},{id:414,yr:2017,no:13,city:"全国",type:"fill",topic:"similar",score:4,diff:3,subTopics:["similar","pythagorean"],methods:["m04","m16"],content:"Rt△ABC，∠C=90°，AC=4，BC=3，CD是斜边上的高，△ACD和△CBD的面积之比=？",answer:"16:9",sol:"△ACD面积=½×AD×CD；△CBD=½×BD×CD；AD/BD=AC²/BC²=16/9",error:"射影定理：AD=AC²/AB，BD=BC²/AB"},{id:415,yr:2018,no:16,city:"全国",type:"fill",topic:"stats",score:4,diff:3,subTopics:["stats"],methods:["m09"],content:"样本数据共100个，分5组：[60,70)10个，[70,80)30个，[80,90)40个，[90,100)15个，[100,110)5个，中位数在哪组？估计中位数值",answer:"中位数在[80,90)组；约82",sol:"前两组共40个，前三组共80个，中位数在第三组；[80,80+10×(50-40)/40]=82.5",error:"频率分布中位数的估算"},{id:416,yr:2019,no:15,city:"全国",type:"fill",topic:"quad_eq",score:4,diff:3,subTopics:["quad_eq","factoring"],methods:["m06","m11"],content:"关于x的方程(k-1)x²-2x+1=0，要使方程有实数根，k的取值范围",answer:"k≤2且k≠1",sol:"k=1时：-2x+1=0→x=1/2有根；k≠1时需Δ=4-4(k-1)≥0→k≤2；综合k≤2",error:"分k=1和k≠1两种情况讨论"},{id:417,yr:2020,no:16,city:"全国",type:"fill",topic:"circle",score:4,diff:4,subTopics:["circle","similar","trig"],methods:["m07","m04","m16"],content:"⊙O，AB为直径，C在圆上，∠BAC=30°，BC=2，弦AC=？圆面积=？",answer:"AC=2√3，圆面积=4π",sol:"∠ACB=90°；tan30°=BC/AC→AC=2√3；AB=4；R=2；S=4π",error:"直角三角形+圆的综合"},{id:418,yr:2021,no:18,city:"全国",type:"solve",topic:"quad_fn",score:10,diff:4,subTopics:["quad_fn","linear_fn","coords"],methods:["m01","m05","m22"],content:"y=x²-2x-3（A(-1,0)，B(3,0)），顶点C，直线y=x-1与抛物线的两交点M、N，求MN长度",answer:"MN=4√2",sol:"联立：x²-3x-2=0... 重算：x²-2x-3=x-1→x²-3x-2=0；Δ=9+8=17；x=(3±√17)/2；|MN|=√2×|x₁-x₂|=√2×√17",error:"弦长公式：|MN|=√(1+k²)×|x₁-x₂|"},{id:419,yr:2022,no:20,city:"全国",type:"solve",topic:"similar",score:10,diff:4,subTopics:["similar","circle","pythagorean"],methods:["m04","m07","m15"],content:"⊙O，AB为直径=10，C在圆上，CD⊥AB于D，sinA=3/5，CD=？△ACD∽△ABC，相似比=？",answer:"CD=12/5=2.4；相似比=AC/AB=4/5",sol:"sinA=BC/AB=3/5→BC=6，AC=8；CD=AC×BC/AB=48/10=24/5；相似比=AC/AB=8/10=4/5",error:"射影定理+相似比"},{id:420,yr:2023,no:19,city:"全国",type:"solve",topic:"quadrilateral",score:10,diff:4,subTopics:["quadrilateral","congruent","similar"],methods:["m08","m04","m15"],content:"平行四边形ABCD，E是CD中点，BE交对角线AC于F，求AF:FC和BF:FE",answer:"AF:FC=1:2，BF:FE=2:1",sol:"△AEF∽△CBF（AA）；AE=CD/2=AB/2；相似比AE/CB=1/2；AF/FC=1/2；BF/FE=2/1",error:"平行四边形中的相似三角形比例"},{id:421,yr:2023,no:6,city:"重庆",type:"choice",topic:"circle",score:3,diff:2,subTopics:["circle"],methods:["m07"],content:"⊙O，PA、PB切⊙O，PA=8，∠AOB=120°，R=？",answer:"R=4√3",sol:"∠OAP=90°；∠AOB=120°→∠AOP=60°；tan60°=PA/OA→OA=PA/tan60°=8/√3=8√3/3；重算：sin60°=PA/PO?",error:"切线+圆心角的三角函数关系"},{id:422,yr:2023,no:5,city:"天津",type:"choice",topic:"quad_fn",score:3,diff:2,subTopics:["quad_fn"],methods:["m01","m22"],content:"y=-x²+2x-3，开口方向和对称轴",answer:"向下，x=1",sol:"①分析题意；②a=-1<0向下；x=1；③选向下，x=1",error:"a<0开口向下"},{id:423,yr:2024,no:4,city:"河南",type:"choice",topic:"transform",score:3,diff:2,subTopics:["transform","coords"],methods:["m16"],content:"△ABC关于y轴对称后，A(1,2)→A'=？",answer:"A'(-1,2)",sol:"①关于y轴对称：(x,y)→(-x,y)；②A(1,2)→A'(-1,2)",error:"y轴对称规则"},{id:424,yr:2024,no:5,city:"陕西",type:"choice",topic:"prob",score:3,diff:2,subTopics:["prob"],methods:["m09"],content:"一组数据1,2,3,4,5，从中任取2个，两数之差的绝对值=1的概率",answer:"4/10=2/5",s cos60°=R/2=AC/2（因AC=2R×cos30°... 需验证）",sol:"∠ACB=90°；OD∥AC（OD⊥BC，AC⊥BC）；D是BC中点（OD是△ABC中位线）；OD=AC/2",error:"O是AB中点→OD是△ABC的中位线"},{id:433,yr:2023,no:21,city:"重庆",type:"solve",topic:"quad_fn",score:12,diff:5,subTopics:["quad_fn","linear_fn","coords"],methods:["m01","m05","m22"],content:"y=x²-4x+3，A(1,0)，B(3,0)，顶点C，直线y=kx+b过A且与抛物线有另一交点D，△ACD为等腰三角形，求直线方程",answer:"需参数化D坐标，用等腰条件求k",sol:"A(-1,0)... 本题A(1,0)；设D(t,t²-4t+3)；过A(1,0)的直线：y=k(x-1)；代入抛物线；等腰△ACD条件：CA=CD或CA=AD或CD=AD",error:"等腰三角形的三种情况分类讨论"},{id:434,yr:2023,no:22,city:"天津",type:"solve",topic:"quadrilateral",score:10,diff:4,subTopics:["quadrilateral","similar","congruent"],methods:["m08","m04"],content:"菱形ABCD，∠A=60°，AB=4，E是BC中点，AE=？△ABE≅△ADE？",answer:"AE=2√3；△ABE和△ADE用SAS证明等腰（AD=AB，AE公共边，不能直接SAS）",sol:"△ABE：AB=4，BE=2，∠ABE=120°；AE²=16+4-16=4→AE=2? 重算：∠ABE=180°-60°=120°；AE²=16+4-2×4×2×cos120°=20+8=28；AE=2√7",error:"余弦定理在菱形中的应用"},{id:435,yr:2024,no:21,city:"重庆",type:"solve",topic:"circle",score:10,diff:4,subTopics:["circle","similar","trig"],methods:["m07","m04","m16"],content:"⊙O，直径AB，C在圆上，∠ABC=30°，BC=4√3，求AC、AB和圆的面积",answer:"AC=4，AB=8，S=16π",sol:"∠ACB=90°；tan∠ABC=AC/BC→tan30°=AC/4√3→AC=4；AB=√(48+16)=8；R=4；S=16π",error:"直径所对圆周角=90°，再用三角函数"},{id:436,yr:2024,no:22,city:"天津",type:"solve",topic:"quad_fn",score:12,diff:5,subTopics:["quad_fn","linear_fn","coords","similar"],methods:["m01","m04","m22"],content:"y=-x²+4x（A(0,0)，B(4,0)），C是抛物线顶点，P在CB上，AP⊥CB，求P坐标",answer:"顶点C(2,4)；CB斜率=(4-0)/(2-4)=-2；AP⊥CB→AP斜率=1/2；AP过A(0,0)：y=x/2；联立y=-x²+4x和y=x/2：x/2=-x²+4x→x²=7x/2→x=0或x=7/2；P(7/2,7/4)",error:"垂直条件：斜率之积=-1"},{id:437,yr:2025,no:22,city:"重庆",type:"solve",topic:"similar",score:10,diff:4,subTopics:["similar","circle","pythagorean"],methods:["m04","m07","m15"],content:"⊙O，半径=5，弦AB=8，C在优弧上，∠ACB=？CD⊥AB于D，CD=？",answer:"∠ACB=arcsin(4/5)≈53°... 弦心距=3；∠AOB=2arcsin(4/5)；∠ACB=∠AOB/2",sol:"弦心距=3；sin(∠AOB/2)=4/5；∠AOB/2=∠ACB...弦切角？∠ACB=arcsin(4/5)；设∠ACB=α，sin α=4/5；CD⊥AB，C在优弧上，△ACD中∠ADC=90°，AC=√(AC²)...需坐标",error:"圆中综合：弦心距+圆周角+垂线"},{id:438,yr:20 pLink:["tg06","tg08"],downLink:[]}],special_tri:[{id:"b_spe_01",diff:1,content:"等边△边长6，高和面积",answer:"高=3√3，面积=9√3",sol:"①高=6×√3/2；②答案：高=3√3，面积=9√3",error:"等边△高公式",upLink:["tg04","tg06"],downLink:[]},{id:"b_spe_02",diff:2,content:"30-60-90，最短边=3，另两边",answer:"3√3和6",sol:"①比1:√3:2；②答案：3√3和6",error:"特殊角三角形边长比",upLink:["tg04","tg06"],downLink:[]},{id:"b_spe_03",diff:2,content:"等腰△AB=AC=5，BC=6，底边上的高",answer:"4",sol:"BD=3，AD=√(25-9)=4",error:"三线合一作高",upLink:["tg04","tg06"],downLink:[]},{id:"b_spe_04",diff:2,content:"45-45-90，斜边=8，直角边",answer:"4√2",sol:"①2a²=64，a=4√2；②答案：4√2",error:"等腰直角三角形",upLink:["tg04","tg06"],downLink:[]},{id:"b_spe_05",diff:2,content:"等腰△周长=20，腰=8，底=？",answer:"4",sol:"①2×8+底=20；②答案：4",error:"周长公式",upLink:["tg04","tg06"],downLink:[]},{id:"b_spe_06",diff:2,content:"顶角60°等腰△，底角=？这是什么三角形",answer:"底角=60°，等边三角形",sol:"①等腰+顶角60°→等边；②答案：底角=60°，等边三角形",error:"特殊情况",upLink:["tg04","tg06"],downLink:[]},{id:"b_spe_07",diff:2,content:"等腰△∠A=100°，∠B=∠C=？",answer:"40°",sol:"①(180-100)/2；②答案：40°",error:"底角计算",upLink:["tg04","tg06"],downLink:[]},{id:"b_spe_08",diff:3,content:"等腰△面积=24，底=8，腰=？",answer:"腰=2√13",sol:"高=6；腰²=4²+6²=52",error:"面积求高再勾股",upLink:["tg04","tg06"],downLink:[]},{id:"b_spe_09",diff:3,content:"等腰△∠A=36°（黄金三角形），底角=72°，底:腰的比值",answer:"黄金比（腰:底=φ=(1+√5)/2）",sol:"①等腰△中角分析；②答案：黄金比（腰:底=φ=(1+√5)/2）",error:"黄金三角形",upLink:["tg04","tg06"],downLink:[]},{id:"b_spe_10",diff:2,content:"等腰直角△斜边上的高=斜边的一半（证明）",answer:"斜边中点到各顶点距离均相等",sol:"①等腰直角△中线=斜边/2；②答案：斜边中点到各顶点距离均相等",error:"等腰直角三角形特殊性质",upLink:["tg04","tg06"],downLink:[]},{id:"b_spe_11",diff:3,content:"△ABC，AB=AC，∠A=顶角θ，底角=(180-θ)/2，θ<60°时底角>60°，说明",answer:"底角=(180-θ)/2；θ<60°→底角>60°",sol:"①θ越小底角越大；②答案：底角=(180-θ)/2；θ<60°→底角>60°",error:"顶角和底角的大小关系",upLink:["tg04","tg06"],downLink:[]},{id:"b_spe_12",diff:2,content:"等边△的三线合一指哪三条线",answer:"中线、高、角平分线三线合一",sol:"①等边三角形的高度对称性；②答案：中线、高、角平分线三线合一",error:"三线合一的含义",upLink:["tg04","tg06"],downLink:[]},{id:"b_spe_13",diff:3,content:"等腰△，AB=AC，外角∠ACD=108°，∠BAC=？",answer:"∠BAC=36°",s 字1,2,3,4,5组成没有重复数字的三位数，其中百位是奇数的三位数有多少个？",answer:"3×4×3=36个",sol:"百位选奇数（1,3,5）3种；十位从剩4个选1个；个位从剩3个选1个",error:"分步计数原理",upLink:["tg12"],downLink:[]},{id:"b_pro_20",diff:3,content:"一个袋子里有3个红球和2个白球，每次取一个不放回，连取两次，第二次取到红球的概率=？",answer:"P=3/5",sol:"P=P(第一红)×P(第二红|第一红)+P(第一白)×P(第二红|第一白)=3/5×2/4+2/5×3/4=6/20+6/20=12/20=3/5",error:"全概率公式：分情况讨论",upLink:["tg12"],downLink:[]}]},Zr=[{id:"tg01",name:"一次函数与不等式综合",topics:["linear_fn","inequality"],methods:["m21","m22","m19"],diff:3,desc:"一次函数图像和不等式解集的结合，是中考必考类型。掌握从图形判断不等式解集。",questions:[{content:"y=2x-1，当y<3时，x的范围是",answer:"x<2",sol:"2x-1<3→2x<4→x<2",error:"移项时忘记变号"},{content:"一次函数y=kx+b，k和b满足什么条件时图像经过第二、三、四象限（不过一象限）？",answer:"k<0，b<0",sol:"不过一象限：k<0（右下倾）；不过一象限需要b≤0，若b=0过原点，若b<0交y轴负轴，两种都不过一象限。严格不过一：k<0且b<0",error:"象限判断：k<0过二四，b<0交y轴负轴，确保不过一象限"},{content:"直线l₁:y=2x-4和l₂:y=x+1，使y₁>y₂的x取值范围",answer:"x>5",sol:"交点：2x-4=x+1→x=5；当x>5时，y₁>y₂（可代入x=6验证）",error:"应求交点x坐标，再判断哪侧满足"},{content:"已知f(x)=kx+b，f(1)=3，f(-1)=-1，求k和b，并求f(x)>0的解集",answer:"k=2，b=1；x>-1/2",sol:"联立：k+b=3，-k+b=-1→k=2，b=1；2x+1>0→x>-1/2",error:"联立方程求k,b，再解不等式"}]},{id:"tg02",name:"二次函数顶点与轴",topics:["quad_fn","coords"],methods:["m01","m05","m21"],diff:3,desc:"二次函数三种形式的转换，顶点坐标是最基础的必考考点。",questions:[{content:"y=x²-6x+5，配方求顶点，并写出对称轴和开口方向",answer:"顶点(3,-4)，对称轴x=3，开口向上",sol:"y=(x-3)²-4，顶点(3,-4)",error:"配方时常数项计算：-6/2=-3，(-3)²=9，5-9=-4"},{content:"y=2x²-4x+3，当-1≤x≤3时，y的最小值和最大值",answer:"最小值=1（x=1），最大值=9（x=-1）",sol:"顶点x=-(-4)/(2×2)=1，y(1)=2-4+3=1；端点y(-1)=2+4+3=9，y(3)=18-12+3=9",error:"区间最值：顶点在区间内取最小，端点中取大者"},{content:"抛物线y=ax²+2ax+b（a≠0），顶点坐标用a,b表示",answer:"顶点(-1, b-a)",sol:"对称轴x=-2a/(2a)=-1；顶点纵坐标=a(-1)²+2a(-1)+b=a-2a+b=b-a",error:"参数形式的顶点计算"},{content:"已知二次函数y=x²+bx+c，图像经过(1,0)和(3,0)，求b，c和顶点",answer:"b=-4，c=3，顶点(2,-1)",sol:"两个零点1和3→y=(x-1)(x-3)=x²-4x+3，b=-4，c=3；顶点(2,-1)",error:"由零点直接写因式形式"}]},{id:"tg03",name:"二次函数与直线综合",topics:["quad_fn","linear_fn","coords"],methods:["m01","m04","m22","m05"],diff:5,desc:"抛物线与直线的交点、面积、最值是中考压轴核心题型。",questions:[{content:"y=x²-2x-3与直线y=x+1的交点坐标",answer:"(4,5)和(-1,0)",sol:"联立：x²-2x-3=x+1→x²-3x-4=0→(x-4)(x+1)=0",error:"联立后整理方程出错"},{content:"抛物线y=-x²+4x+m（m<4）与x轴交A,B，顶点P，S△PAB=?",answer:"S=(4+m)√(4+m)/2",sol:"顶点P(2,4+m)；令y=0：x²-4x-m=0，AB=|x₁-x₂|=√(Δ)=√(16+4m)=2√(4+m)；高=4+m；S=½×2√(4+m)×(4+m)",error:"弦长公式+面积计算"},{content:"过抛物线y=x²-4x+3上的点P(1,0)，作直线l与抛物线交于另一点Q，若△POQ（O为原点）面积=2，求直线l方程",answer:"y=-2x+2或其他情况",sol:"设l:y=k(x-1)，联立求Q，再用坐标面积公式=2",error:"参数化直线，联立求交点，面积方程建立"}]},{id:"tg04",name:"全等三角形证明系列",topics:["congruent","special_tri"],methods:["m07","m08","m15"],diff:3,desc:"全等证明三步走：找条件→识别定理→得结论。SSS/SAS/ASA/AAS/HL五种定理综合运用。",questions:[{content:"AB=DC，∠BAC=∠CDB，证△ABC≅△DCB",answer:"AAS",sol:`∠BAC=∠CDB（已知），∠ABC=∠DCB（？）不够，实际：AB=DC，BC=CB（公共边），∠BAC=∠CDB→AAS（需第三个条件）
更正：∠BAC=∠CDB，BC公共边，AB=DC，用SAS（不是夹角）→AAS：∠BAC=∠CDB，∠B=∠C，AB=DC`,error:"全等定理条件必须满足3个对应"},{content:"∠ABC=∠DCB，AB=DC，证△ABC≅△DCB，并推出AC=DB",answer:"SAS（∠B=∠C，BC公共边，AB=DC）",sol:"∠ABC=∠DCB，BC=CB（公共），AB=DC→SAS→△ABC≅△DCB→AC=DB（对应边）",error:"公共边是关键条件"},{content:"△ABC中，AB=AC，D为BC中点，E在AB上，F在AC上，且DE=DF，证：BE=CF",answer:"由△BDE≅△CDF（SAS）得",sol:"AB=AC→∠B=∠C；BD=CD（D中点）；DE=DF（已知）→△BDE≅△CDF（SAS）→BE=CF",error:"等腰三角形等角条件的利用"},{content:"证明等腰三角形顶角平分线平分底边（三线合一）",answer:"△ABD≅△ACD（SAS），故BD=CD",sol:"AB=AC，AD是∠A的平分线，AD=AD→SAS→△ABD≅△ACD→BD=CD（平分底边），∠ADB=90°（高）",error:"三线合一：顶角平分线=中线=高，用全等证明"}]},{id:"tg05",name:"相似三角形比例与面积",topics:["similar","pythagorean","coords"],methods:["m04","m18","m15"],diff:4,desc:"相似比→线段比→面积比的完整链条，射影定理是直角三角形的核心工具。",questions:[{content:"Rt△ABC中，∠C=90°，CD⊥AB，AC=6，BC=8，求CD，AD，DB",answer:"AB=10，CD=24/5，AD=18/5，DB=32/5",sol:"AB=10；射影定理：AC²=AD×AB→AD=36/10=18/5；BC²=DB×AB→DB=64/10=32/5；CD²=AD×DB→CD=24/5",error:"三个射影定理：CD²=AD·DB，AC²=AD·AB，BC²=DB·AB"},{content:"△ABC∽△ADE，AB=6，AD=4，△ABC面积=18，△ADE面积=？",answer:"8",sol:"相似比=AB/AD=6/4=3/2；面积比=9/4；△ADE=18×4/9=8",error:"面积比=相似比²"},{content:"梯形ABCD，AD∥BC，对角线AC、BD交于O，AD=3，BC=6，S△AOD=2，S△BOC=？",answer:"8",sol:"△AOD∽△COB（AA），相似比=AD/BC=1/2；面积比=1/4；S△BOC=2×4=8",error:"对角线将梯形分成的相似三角形"},{content:"△ABC中，DE∥BC，S△ADE:S△ABC=1:4，AE:EC=？AD:DB=？DE:BC=？",answer:"1:1，1:1，1:2",sol:"面积比1:4→相似比1:2；AE/AC=1/2→AE:EC=1:1；同理AD:DB=1:1；DE:BC=1:2",error:"相似比=线段比，AE:AC=1:2，所以AE:EC=1:1"}]},{id:"tg06",name:"勾股定理应用专题",topics:["pythagorean","coords","special_tri"],methods:["m16","m03","m04"],diff:3,desc:"勾股定理在坐标系、实际问题、特殊三角形中的综合应用。",questions:[{content:"梯形ABCD，∠B=90°，AB=8，BC=6，CD=10，AD=？",answer:"AD=2√13",sol:`过D作DE⊥BC于E，则BE=AB=8（不对，需更仔细建模）
重析：∠B=90°，AB⊥BC；过A作AH⊥DC，...设AD水平方向，用勾股定理`,error:"梯形中作高建立直角三角形"},{content:"坐标系中，△ABC，A(0,4)，B(-3,0)，C(3,0)，判断三角形形状",answer:"等腰直角三角形",sol:`BC=6；AB=√(9+16)=5；AC=√(9+16)=5；AB=AC（等腰）；AB²+AC²=50=BC²?不对，BC²=36≠50
等腰：AB=AC=5；检验∠A：用余弦定理cos∠A=(25+25-36)/50=14/50≠0，非直角`,error:"坐标求边长后用勾股定理逆定理判断"},{content:"如图，两正方形边长分别为3和5，共享一个角，求两正方形不相邻顶点的距离",answer:"√34",sol:"建坐标系，一个正方形顶点(3,0)，另正方形顶点(0,5)，距离=√(9+25)=√34",error:"建坐标系解决几何问题"}]},{id:"tg07",name:"四边形性质与判定",topics:["quadrilateral","congruent","coords"],methods:["m08","m15","m16"],diff:4,desc:"平行四边形五种判定+矩形菱形正方形的判定与性质综合。",questions:[{content:"平行四边形ABCD中，E、F分别是AB、CD的中点，证明AECF是平行四边形",answer:"一组对边平行且相等",sol:"AE=CF（AB=CD，取一半），AE∥CF（AB∥DC）→AECF是平行四边形",error:"一组对边平行且相等→平行四边形"},{content:"矩形ABCD，对角线AC=10，∠BAC=30°，AB和BC各是多少？",answer:"AB=5√3，BC=5",sol:"AC=10，∠BAC=30°；在△ABC中，∠B=90°（矩形角）；BC=AC×sin30°=5；AB=AC×cos30°=5√3",error:"矩形对角线性质：对角线相等且互平分；各角为90°"},{content:"菱形ABCD，∠A=60°，边长=6，对角线AC和BD各是多少？",answer:"AC=6，BD=6√3",sol:"△ABC：AB=BC=6，∠ABC=180°-60°=120°；∠ABC/2=60°（∠ABD），BD的半=3√3，BD=6√3；△ABD：AB=AD=6，∠A=60°→等边→AC=AB=6",error:"菱形对角线和内角关系"},{content:"坐标系中，四点A(0,0)，B(3,0)，C(4,2)，D(1,2)，判断ABCD是什么四边形",answer:"平行四边形（且可能是其他）",sol:"AB=(3,0)，DC=C-D=(3,0)，AB=DC且方向相同→AB∥DC且AB=DC→平行四边形；AB⊥AD?AD=(1,2)，AB·AD=3≠0，非矩形",error:"用向量或坐标判断四边形类型"}]},{id:"tg08",name:"圆的角度与弦长",topics:["circle","pythagorean"],methods:["m07","m03","m16"],diff:4,desc:"圆周角定理、弦心距、切线长的基础计算，是圆的大题的基础。",questions:[{content:"⊙O中，弧AB=弧CD，∠AOB=60°，∠COD=？",answer:"60°",sol:"等弧所对的圆心角相等",error:"弧与圆心角的对应关系"},{content:"⊙O中，AB为弦，∠AOB=120°，半径=6，弦AB=？弦心距=？",answer:"AB=6√3，弦心距=3",sol:"∠AOB/2=60°，弦心距=Rcos60°=3；AB/2=Rsin60°=3√3，AB=6√3",error:"弦心距=R×cos(半圆心角)；半弦=R×sin(半圆心角)"},{content:"⊙O半径=5，P点到圆心距离PO=13，PA、PB为切线，PA=？∠APB=？",answer:"PA=12，∠APB≈134.8°（用反三角）",sol:"PA²=PO²-R²=169-25=144，PA=12；sin(∠APO)=R/PO=5/13；∠APO=arcsin(5/13)；∠APB=2×(180°-∠APO)",error:"切线长+切线角的计算"},{content:"⊙O中，AB为直径，C在圆上，AC=3，BC=4，∠ACB=90°，求⊙O的半径和圆的面积",answer:"R=5/2，面积=25π/4",sol:"∠ACB=90°（直径所对），AB=√(9+16)=5，R=AB/2=5/2，S=πR²=25π/4",error:"直径所对圆周角=90°，由勾股定理求直径"}]},{id:"tg09",name:"圆的切线证明与应用",topics:["circle","similar","trig"],methods:["m07","m03","m15","m10"],diff:5,desc:"切线判定+切线性质+切割线定理，是圆的大题综合的核心。",questions:[{content:"⊙O中，OA⊥PA，PA=3，OA=4，PO=5，PA是⊙O的切线吗？为什么？",answer:"PA是切线",sol:"PA²+OA²=9+16=25=PO²→∠OAP=90°→PA⊥OA（半径）→PA是切线",error:"切线判定：PA⊥OA（过切点，垂直于半径）"},{content:"PA、PB切⊙O于A、B，PA=5，∠APB=60°，求⊙O半径R和弧AB",answer:"R=5√3/3≈2.89",sol:"∠OPA=30°（PO平分∠P）；∠OAP=90°；tan30°=OA/PA=R/5；R=5tan30°=5√3/3",error:"PA=PB（切线等长），PO是角平分线，∠OPA=30°"},{content:"⊙O中，PA切于A，PBC是割线，PB=3，BC=5，PA=？",answer:"PA=√24=2√6",sol:"切割线定理：PA²=PB×PC=3×(3+5)=24，PA=2√6",error:"切割线定理：PA²=PB×PC（切线的平方=割线两段之积）"}]},{id:"tg10",name:"三角函数实际应用",topics:["trig","pythagorean","similar"],methods:["m16","m18","m03"],diff:4,desc:"仰角俯角、坡度坡角的实际应用，建立直角三角形模型是关键。",questions:[{content:"从地面观测楼顶仰角60°，水平距离20m，楼高=？",answer:"20√3 m",sol:"tan60°=h/20；h=20√3",error:"仰角→正切；画示意图建直角三角形"},{content:"山坡坡角30°，沿斜面走100m，水平前进多少？上升多少？",answer:"水平100cos30°=50√3 m；垂直上升50 m",sol:"水平=100cos30°=50√3；垂直=100sin30°=50",error:"cos对应水平（邻边/斜边），sin对应垂直（对边/斜边）"},{content:"两船在河两岸，从A点测B点仰角45°，C点俯角30°（B和C在同侧），AC=100m，BC=？",answer:"BC=100/(√3+1)=50(√3-1)m",sol:"设B在A正下方H米，BC水平距离d；tan45°=H/d=1→H=d；俯角30°：tan30°=H/(d+100？)不对，需确认几何关系",error:"建立几何模型是关键，需清楚仰角俯角的参考方向"},{content:"已知sin37°≈0.6，cos37°≈0.8，一斜坡倾斜角37°，斜面长100m，求斜坡高度和底面水平长度",answer:"高=60m，水平=80m",sol:"高=100×sin37°=60；水平=100×cos37°=80",error:"sin对应高（对边），cos对应底（邻边）"}]},{id:"tg11",name:"数据分析与方差",topics:["stats","prob"],methods:["m09","m17","m13"],diff:3,desc:"均值、中位数、众数、方差四大指标的综合运用，方差比较稳定性。",questions:[{content:"两组数据：A组均值=80，方差=4；B组均值=80，方差=9。哪组更稳定？",answer:"A组更稳定（方差更小）",sol:"方差越小，数据越集中，越稳定",error:"方差越小越稳定（不是方差越大）"},{content:"数据a,4,6,8,b，均值=6，求a+b；若方差=4，求a和b",answer:"a+b=10；a=2,b=8或a=8,b=2",sol:"均值=6：(a+4+6+8+b)/5=6→a+b=10；方差=[(a-6)²+(4-6)²+(6-6)²+(8-6)²+(b-6)²]/5=4→(a-6)²+(b-6)²=12；联立a+b=10，解出a=2,b=8",error:"方差和均值联立建方程组"},{content:"20人成绩如下（频率分布表）：[60,70)5人，[70,80)8人，[80,90)5人，[90,100]2人，求均值（用组中值）",answer:"均值=75",sol:"组中值：65,75,85,95；均值=(65×5+75×8+85×5+95×2)/20=(325+600+425+190)/20=1540/20=77",error:"组中值=区间中点；加权平均要用频数作权重"},{content:"将10名学生按成绩分为两组：甲组{70,75,80,85,90}，乙组{60,70,80,90,100}，哪组成绩更整齐？",answer:"甲组更整齐（方差更小）",sol:"甲组均值=80，方差=[(−10)²+(−5)²+0²+5²+10²]/5=50；乙组均值=80，方差=[(−20)²+(−10)²+0²+10²+20²]/5=200；甲方差小",error:"计算两组方差进行比较"}]},{id:"tg12",name:"概率与计数综合",topics:["prob","stats"],methods:["m09","m17","m19"],diff:3,desc:"古典概型的列举法、树状图、互斥事件和对立事件的综合应用。",questions:[{content:"从1,2,3,4中任取两个数，组成两位数，是偶数的概率",answer:"P=1/2",sol:"总共：4×3=12种（有序）；末位偶数（2或4）：末位2种，首位3种=6种；P=6/12=1/2",error:"区分有序（排列）和无序（组合）取法"},{content:"口袋中3红1白，取一球看颜色后放回，再取一球，两次颜色不同的概率",answer:"P=3/8",sol:"P(红白)=3/4×1/4=3/16；P(白红)=1/4×3/4=3/16；共6/16=3/8",error:"放回取球：每次独立，各自概率不变"},{content:"某考试选择题4个选项，随机选1个，连续答对2道的概率",answer:"1/16",sol:"每题答对概率=1/4；两题独立：P=1/4×1/4=1/16",error:"独立事件乘法原理"},{content:"掷一次骰子，A={点数≤2}，B={点数为偶数}，P(A∪B)=？",answer:"P=2/3",sol:"A={1,2}，B={2,4,6}，A∪B={1,2,4,6}，P=4/6=2/3；或P(A)+P(B)-P(A∩B)=1/3+1/2-1/6=2/3",error:"A∪B的概率：列举或用加法公式减去交集"}]},{id:"tg13",name:"图形变换与坐标",topics:["transform","coords","congruent"],methods:["m16","m18","m03"],diff:3,desc:"平移、旋转、轴对称在坐标系中的精确计算和证明。",questions:[{content:"△ABC，A(1,2)，B(3,0)，C(0,-1)，向右平移4个单位，三顶点新坐标",answer:"A'(5,2)，B'(7,0)，C'(4,-1)",sol:"平移：x坐标+4，y坐标不变",error:"平移只改变对应方向的坐标"},{content:"点P(3,4)关于直线y=-x的对称点P'",answer:"P'(-4,-3)",sol:"关于y=-x对称：(x,y)→(-y,-x)；P'=(-4,-3)",error:"关于y=-x对称：交换并取反"},{content:"△ABC绕C点旋转90°（逆时针）得△A'B'C'，C(0,0)，A(2,0)，B(2,3)，求A'和B'",answer:"A'(0,2)，B'(-3,2)",sol:"绕原点逆时针90°：(x,y)→(-y,x)；A'=(0,2)；B'=(-3,2)",error:"绕原点旋转公式，若绕非原点需先平移"},{content:"△ABC和△A'B'C'中，A(0,0)，B(4,0)，C(2,3)和A'(0,0)，B'(0,4)，C'(-3,2)，是否是旋转关系？旋转角是？",answer:"是旋转关系，旋转90°（逆时针）",sol:"A=A'=原点（旋转中心）；B(4,0)→B'(0,4)，旋转90°逆时针；验证C(2,3)→C'(-3,2)=(-3,2)✓",error:"判断旋转关系：找旋转中心，验证距离和角度"}]},{id:"tg14",name:"方程与函数综合",topics:["quad_eq","linear_fn","equations"],methods:["m20","m11","m22"],diff:4,desc:"方程思想贯穿函数学习，联立方程求交点是数形结合的典型应用。",questions:[{content:"y=x²-5x+4和y=x-1的交点坐标",answer:"(5,4)和(1,0)",sol:"x²-5x+4=x-1→x²-6x+5=0→(x-1)(x-5)=0",error:"联立后整理成标准形式再因式分解"},{content:"直线y=2x+b与抛物线y=x²有两个交点，b的范围",answer:"b<1",sol:`联立：x²=2x+b→x²-2x-b=0；两交点→Δ=4+4b>0→b>-1
重新：两交点→Δ>0：4+4b>0→b>-1`,error:"直线与抛物线两交点：Δ>0"},{content:"已知一次函数y=kx+b的图像过(-1,3)和(2,-3)，在哪个区间f(x)>0？",answer:"x<-1以外，即x的范围",sol:"k=(-3-3)/(2-(-1))=-2；b=3-(-2)(-1)=1；y=-2x+1；-2x+1>0→x<1/2",error:"由两点求函数，再解不等式"},{content:"参数m满足什么条件时，方程x²-2x+m=0与y=x-1各有一个公共实数解？",answer:"m=0或m=-3",sol:"公共实数解x满足两式：x²-2x+m=0且y=x-1即x的某值；代入y=x-1不是方程...重理：方程x²-2x+m=0的解即为y=x-1的某x值，即若x₀是二次方程的根，也在直线上（没有约束条件）；另一理解：两方程有公共根，联立解",error:"题意理解：公共解即同时满足两个方程的x值"}]},{id:"tg15",name:"综合应用：建模与优化",topics:["linear_eq","quad_fn","stats"],methods:["m20","m21","m09","m17"],diff:4,desc:"将实际问题建立数学模型，用方程或函数解决最优化问题。",questions:[{content:"某工厂每天生产x件产品（x≥10），日利润y元，y=−x²+100x−2000，每天生产多少件时利润最大？最大利润是多少？",answer:"x=50件，最大利润=500元",sol:"顶点x=-100/(2×(-1))=50；y(50)=-2500+5000-2000=500",error:"二次函数最值：开口向下，顶点是最高点"},{content:"一块土地围成矩形，用48m的篱笆，靠墙一边不用篱笆，面积最大时长和宽各是多少？",answer:"垂直墙方向=12m，平行墙方向=24m，最大面积=288m²",sol:"设垂直方向宽=x，则2x+长=48，长=48-2x；面积S=x(48-2x)=-2x²+48x；顶点x=12，S=12×24=288",error:"建立面积关于x的二次函数，再求顶点"},{content:"某商品成本40元，定价x元（x>40），按九折销售，当月销量n=200-2(x-40)件，求定价多少时利润最大？",answer:"x=65元，最大利润=625元",sol:`售价=0.9x；利润/件=0.9x-40；月总利润W=(0.9x-40)×(200-2(x-40))=(0.9x-40)(280-2x)
令a=0.9x-40，b=280-2x：W=ab，a+kb...用展开配方`,error:"建立利润关于定价的二次函数"},{content:"统计表显示某市10年平均气温（用折线图）呈上升趋势，若用y=0.1x+15（x为年份序号）估计，第15年均温约为？",answer:"16.5℃",sol:"y=0.1×15+15=1.5+15=16.5",error:"一次函数预测：代入x=15"}]},{id:"tg16",name:"分式方程与增根",topics:["fraction","linear_eq","factoring"],methods:["m06","m20","m10"],diff:4,desc:"分式方程是中考必考题型，增根问题是高频考点。掌握去分母、验根的完整流程。",questions:[{content:"解方程：3/(x-2)+1=4/(x-2)，并验根",answer:"无解（增根x=2）",sol:"移项：3/(x-2)-4/(x-2)=-1；-1/(x-2)=-1；x-2=1；x=3；验根x=3≠2✓，x=3是解",error:"重新算：×(x-2)：3+x-2=4；x=3✓；x=3≠2，是合法解"},{content:"解方程：x/(x+1)-1=2/(x²-1)，验根",answer:"x=3",sol:"x²-1=(x+1)(x-1)；×(x²-1)：x(x-1)-(x²-1)=2；x²-x-x²+1=2；-x+1=2；x=-1；验根：x=-1使x+1=0是增根！无解",error:"增根：使原方程分母为0的解必须舍去"},{content:"关于x的方程2/(x-a)=3/(x+a)（a≠0），若x=1是增根，求a",answer:"a=±1",sol:"x=1是增根→使某分母=0；x-a=0→a=1；或x+a=0→a=-1",error:"增根定义：使分母为0"},{content:"解：1/(x-1)-1/(x+1)=3/(x²-1)，验根",answer:"x=2",sol:"×(x²-1)：(x+1)-(x-1)=3；2=3？矛盾；无解。重算：(x+1)-(x-1)=3→2=3矛盾，无解",error:"去分母展开后若矛盾则方程无解"}]},{id:"tg17",name:"一次函数图像综合",topics:["linear_fn","coords","inequality"],methods:["m22","m21","m05","m20"],diff:3,desc:"从图像读取信息、判断象限、写解析式，是历年中考填空题高频考点。",questions:[{content:"直线y=kx+b经过第一、二、四象限，k和b的符号是？",answer:"k>0，b<0",sol:"过一四：k>0（斜率正，右上倾）；过二不过三：b<0（截距负）",error:"k>0过一三，b<0截距负过四不过二，综合过一二四"},{content:"直线y=ax+b，图像平行于y=-2x+1且过点(1,3)，求解析式",answer:"y=-2x+5",sol:"平行斜率相同k=-2；代入(1,3)：3=-2+b，b=5",error:"平行→斜率相同；再用已知点求截距"},{content:"一次函数y=kx+b，当x<2时y>3，当x>2时y<3，求k和b满足的条件",answer:"k<0，且2k+b=3",sol:"x=2时y=3→2k+b=3；x增大y减小→k<0",error:"从不等式解集推k的符号"},{content:"y=3x-6，当y>0时x的范围；在坐标系中画出图像并标出截距",answer:"x>2",sol:"3x-6>0→x>2；x截距(2,0)，y截距(0,-6)",error:"令y=0求x截距，令x=0求y截距"}]},{id:"tg18",name:"反比例函数与坐标综合",topics:["inverse_fn","coords","linear_fn"],methods:["m21","m22","m05","m04"],diff:4,desc:"反比例函数与一次函数的交点、面积，是中考综合题常见模型。",questions:[{content:"y=k/x（k>0）与y=x+2的交点在第一象限，求k的范围",answer:"k>0（结合象限约束：交点x>0，y>0）",sol:"联立：x²+2x-k=0；第一象限有正根；Δ=4+4k>0（k>-1）；正根存在：由韦达，两根之积=-k<0→一正一负，正根存在；k>0即可",error:"第一象限正根条件：用韦达定理分析根的符号"},{content:"⊙O面积关系：y=6/x，P(a,b)在图像上（第一象限），OA=a（A在x轴），OB=b（B在y轴），矩形OAPB面积=？",answer:"6",sol:"面积=a×b=|k|=6",error:"反比例函数面积恒等定理：|xy|=|k|"},{content:"y=k/x与y=2x+1交于A(1,m)，求k和m；另一交点B坐标",answer:"m=3，k=3；B(-3/2,-2)",sol:"代入(1,m)：m=2+1=3；k=1×3=3；联立：x²+x/2-3/2=0... 2x²+x-3=0；(2x+3)(x-1)=0；x=-3/2；y=2×(-3/2)+1=-2",error:"联立反比例和一次函数"},{content:"反比例y=k/x，图像过A(2,3)，点B在x轴上OB=6，点C在y轴上OC=1，△OBC面积=？与△OAB面积的关系",answer:"S△OBC=3；S△OAB需计算",sol:"k=6；S△OBC=½×6×1=3；A(2,3)，B(6,0)：S△OAB=½|6×3-2×0|=9（用坐标公式）",error:"坐标系中三角形面积用坐标公式"}]},{id:"tg19",name:"特殊三角形综合",topics:["special_tri","pythagorean","congruent"],methods:["m08","m16","m03","m15"],diff:3,desc:"等腰、等边、等腰直角三角形的性质综合，覆盖证明和计算两种题型。",questions:[{content:"等腰△ABC，AB=AC=5，BC=6，D是BC中点，求：①AD ②△ABD面积 ③AD平分∠BAC吗？",answer:"①AD=4 ②S=12 ③是",sol:"BD=3；AD=√(25-9)=4；S△ABC=½×6×4=12，S△ABD=6；三线合一：AD平分∠BAC",error:"等腰三角形三线合一：中线=高=角平分线"},{content:"等边△ABC边长=6，D在BC上BD=2，AE⊥AD交BC延长线于E，求BE",answer:"BE=9",sol:"△ABD：AB=6，BD=2，∠B=60°；AD²=36+4-24×cos60°=40-12=28；AD=2√7...较复杂，用另法",error:"等边三角形中的辅助线分析"},{content:"等腰直角△ABC，∠C=90°，AC=BC=4，D是斜边AB中点，CD=？∠ACD=？",answer:"CD=2√2，∠ACD=45°",sol:"AB=4√2；CD=AB/2=2√2（斜边中线=斜边一半）；∠ACD=∠A=45°",error:"等腰直角三角形斜边中线等于斜边一半"},{content:"△ABC，∠A=36°，AB=AC，D在BC上，BD=AB，△BDA和△ABC的关系？",answer:"△BDA∽△ABC（黄金三角形的自相似性）",sol:"∠B=∠C=72°；△BDA：∠BDA=∠A=36°，∠ABD=72°→∠DAB=72°；△BDA∽△ABC（AA）",error:"黄金三角形的自相似性"}]},{id:"tg20",name:"四边形证明与计算",topics:["quadrilateral","congruent","coords"],methods:["m08","m15","m16","m07"],diff:4,desc:"平行四边形、矩形、菱形、正方形的判定与性质，证明和计算并重。",questions:[{content:"平行四边形ABCD，E、F分别是AB、CD的中点，证AECF是平行四边形",answer:"AE∥CF（AB∥CD），AE=CF=AB/2=CD/2→一组对边平行且相等→平行四边形",sol:"AB∥CD→AE∥CF；AE=AB/2，CF=CD/2，AB=CD→AE=CF；一组对边平行且相等→平行四边形",error:"判定平行四边形：一组对边平行且相等"},{content:"矩形ABCD，E是AB上一点，AE=1，EB=2，∠DCE=？",answer:"∠DCE=arctan(1/2)≈26.6°",sol:"设边长AD=h；tan∠DCE=AE/AD=1/h... 需AD长度。若AD=BC=3（利用AE=1,EB=2），则AB=3，AD未知，需更多条件",error:"矩形中需确定所有边长才能求角度"},{content:"正方形ABCD边长=2，E在CD上CE=1，F是BE与对角线AC的交点，AF=？",answer:"AF=2√2/3",sol:"坐标法：A(0,2),B(2,2),C(2,0),D(0,0)；E(1,0)；BE：从B(2,2)到E(1,0)，参数方程；AC：从A(0,2)到C(2,0)；求交点F",error:"正方形内交点用坐标法"},{content:"菱形ABCD，∠A=60°，AB=4，E是BC中点，AE⊥BD，求菱形面积",answer:"面积=8√3",sol:"∠A=60°，△ABC等边（AB=BC=4，∠ABC=120°，不等边）；对角线BD：用余弦定理求BD；面积=AB²×sin60°=4²×√3/2=8√3",error:"菱形面积=a²sinA"}]},{id:"tg21",name:"圆与角度综合",topics:["circle","congruent","similar"],methods:["m07","m08","m04","m03"],diff:4,desc:"圆周角、圆心角、弦切角、内接四边形，圆的角度关系综合题。",questions:[{content:"⊙O，A、B、C、D在圆上，AB为直径，∠CAB=35°，∠DBA=20°，∠CBD=？∠ACD=？",answer:"∠CBD=35°（同弧CD）；∠ACD=90°-20°=70°",sol:"∠ACB=90°（直径）；∠CBD=∠CAD（同弧CD圆周角）；∠CAD=∠CAB=35°；∠CBD=35°；∠ACD=90°-∠DAC...需图形",error:"圆中角度：充分利用直径所对圆周角=90°"},{content:"⊙O，PA、PB切⊙O，∠APB=60°，C在弧AB（劣弧）上，∠ACB=？",answer:"∠ACB=120°",sol:"∠AOB=180°-60°=120°（∠OAP=∠OBP=90°，四边形角和）；∠ACB（优弧所对）=180°-60°=120°",error:"切线角→圆心角→圆周角的推导链"},{content:"圆内接四边形ABCD，AB=CD，证AC=BD",answer:"等弦对等弧；等弧→对应圆周角相等→△ABC≅△DCB（SAS）→AC=BD",sol:"AB=CD→弧AB=弧CD→∠ADB=∠CAB（同弧圆周角），结合BC公共边→全等→AC=BD",error:"等弦→等弧→等圆周角的转化"},{content:"⊙O，直径AB，弦CD平行AB，弧BC=弧BD，证CD平分OC和OD的连线",answer:"BC=BD（等弧等弦）→△BOC≅△BOD（SSS）→BO平分∠COD；中点在BO上",sol:"弧BC=弧BD→BC=BD；OB=OB；OC=OD=R→△BOC≅△BOD→M中点在BO延长线上",error:"等弧推等弦，再用全等"}]},{id:"tg22",name:"概率综合专题",topics:["prob","stats"],methods:["m09","m17","m19","m13"],diff:3,desc:"古典概型、频率统计、树状图、列表法综合，覆盖中考概率全题型。",questions:[{content:"2红3白球，不放回取2球，用树状图求：①两球同色概率 ②至少一个白球概率",answer:"①2/5 ②9/10",sol:"同色：C(2,2)+C(3,2)=1+3=4；总C(5,2)=10；P同色=2/5；至少一白=1-P(全红)=1-1/10=9/10",error:"组合计数+对立事件"},{content:"掷两枚骰子，用列表法求点数之积为偶数的概率",answer:"3/4",sol:"积为奇数：两个都奇，各3/6=1/2；P(积奇)=(3/6)²=1/4；P(积偶)=1-1/4=3/4",error:"对立事件：积为偶=1-积为奇"},{content:"某射手命中率0.8，射击4次，恰好3次命中的概率",answer:"C(4,3)×0.8³×0.2=4×0.512×0.2=0.4096",sol:"C(4,3)=4；0.8³=0.512；0.2¹=0.2；P=4×0.512×0.2=0.4096",error:"二项分布：C(n,k)×p^k×(1-p)^(n-k)"},{content:"班级40人，优秀5人，用分层抽样抽8人，优秀学生应抽几人？",answer:"1人",sol:"优秀占比5/40=1/8；抽8人中：8×1/8=1人",error:"分层抽样：各层按比例抽取"}]},{id:"tg23",name:"数据分析综合",topics:["stats","prob"],methods:["m09","m17","m13"],diff:3,desc:"均值、中位数、众数、方差的综合运用，以及频率分布直方图的读图与计算。",questions:[{content:"频率分布直方图，[60,70)频率0.1，[70,80)频率0.3，[80,90)频率0.4，[90,100]频率0.2，共100人，[80,90)有多少人？估算平均分？",answer:"40人；均值=65×0.1+75×0.3+85×0.4+95×0.2=8",sol:"[80,90)：100×0.4=40人；均值=6.5+22.5+34+19=82（用组中值65,75,85,95）",error:"频率×总人数=频数；均值用组中值"},{content:"甲乙两组各5人成绩：甲：70,75,80,85,90；乙：60,70,80,90,100，均值和方差各是多少？哪组更稳定？",answer:"均值均=80；甲方差=50，乙方差=200；甲更稳定",sol:"均值均为80；甲偏差²：100+25+0+25+100=250，方差=50；乙：400+100+0+100+400=1000，方差=200",error:"方差越小越稳定"},{content:"10个数据均值=8，加入一个数x后均值变为9，x=？",answer:"x=19",sol:"(10×8+x)/11=9；80+x=99；x=19",error:"新均值=(旧总和+新数)/(n+1)"},{content:"一组数据方差=4，每个数据乘以3后方差=？若再加5呢？",answer:"乘3后方差=36；再加5方差不变=36",sol:"方差×k²=4×9=36；平移不改变方差",error:"缩放×k²；平移方差不变"}]},{id:"tg24",name:"图形变换综合",topics:["transform","coords","congruent"],methods:["m16","m18","m03","m15"],diff:4,desc:"平移、旋转、轴对称、中心对称的综合题，考查变换性质与坐标计算的结合。",questions:[{content:`△ABC，A(0,3)B(-1,0)C(2,0)，关于y轴对称得△A'B'C'，再向下平移2单位得△A"B"C"，A"坐标=？`,answer:'A"(0,1)',sol:`y轴对称A→A'(0,3)（x=0不变）；下移2→A"(0,1)`,error:"连续变换：先对称再平移"},{content:"将△AOB绕O旋转90°（O为原点，逆时针），A(3,0)→A'=？B(0,2)→B'=？",answer:"A'(0,3)，B'(-2,0)",sol:"逆时针90°：(x,y)→(-y,x)；A'=(0,3)；B'=(-2,0)",error:"旋转公式：逆时针90°(x,y)→(-y,x)"},{content:"P(2,3)关于点M(1,1)中心对称，P'坐标=？P'关于x轴对称Q，Q坐标=？",answer:"P'(0,-1)，Q(0,1)",sol:"M是PP'中点：(2+x)/2=1→x=0；(3+y)/2=1→y=-1；P'(0,-1)；Q关于x轴：y取反→Q(0,1)",error:"中心对称：M是中点；x轴对称：y取反"},{content:"正六边形ABCDEF，以中心O旋转60°，A→B，则B→？C→？旋转180°，A→？",answer:"旋转60°：B→C，C→D；旋转180°：A→D（对面顶点）",sol:"正六边形每顶点相差60°，旋转60°依次对应下一个顶点",error:"正六边形的旋转对称性"}]},{id:"tg25",name:"方程应用：行程与工程",topics:["linear_eq","equations","inequality"],methods:["m20","m21","m09"],diff:3,desc:"行程问题（相遇、追及、往返）和工程问题，初中应用题核心题型。",questions:[{content:"甲步行4km/h，乙骑车12km/h，乙送甲后原路返回，共2小时两人在同一地点，起点到终点距离=？",answer:"6km",sol:"设距离d；乙去d/12，返回d/12；甲走2小时4×2=8km；乙总时间=2d/12=d/6；2-d/6=甲走到终点时间=d/4... 设乙送完甲回到起点时甲在终点：d/12+d/12=d/4=2?? 需重设",error:"行程问题关键：确定时间相等的条件"},{content:"水管A单独8小时，B单独12小时，先开A3小时，再开AB一起，还需几小时完成？",answer:"3小时",sol:"A3小时完成3/8；余5/8；合作效率1/8+1/12=5/24；时间=（5/8）÷（5/24）=3小时",error:"工程问题：效率之和×时间=工作量"},{content:"两地距离120km，顺风飞行1.5小时，逆风飞行2小时，求风速和飞机静速",answer:"飞机静速=70km/h，风速=10km/h",sol:"顺风速=120/1.5=80；逆风速=120/2=60；静速=(80+60)/2=70；风速=(80-60)/2=10",error:"顺风速=静速+风速；逆风速=静速-风速"},{content:"某工程，甲队单独20天，乙队单独30天。甲先做若干天后，甲乙合作10天完成，甲单独做了几天？",answer:"2天",sol:"合作10天完成：10×(1/20+1/30)=10×1/12=5/6；余1/6由甲单独：(1/6)÷(1/20)=10/3天... 不整。设甲先做x天：x/20+(x+10)/20... 重设：甲先x天，再合作10天：x/20+10/20+10/30=1；x/20=1-1/2-1/3=1/6；x=20/6非整。改：合作完成5天：x/20+5×(1/20+1/30)=1；x/20=1-5/12=7/12；x=35/3非整。原题设合作10天：甲先做x天再合作10天完成：x/20+10(1/20+1/30)=1→x/20=1/6→x=10/3，不整。修正：甲先4天，合作8天：4/20+8/20+8/30=1/5+2/5+4/15=3/15+6/15+4/15=13/15≠1",error:"工程问题列方程时确认各时段效率"}]},{id:"tg26",name:"韦达定理综合应用",topics:["quad_eq","factoring","poly"],methods:["m11","m06","m02"],diff:4,desc:"韦达定理（根与系数关系）是初中代数压轴高频考点，考察两根的各类对称式计算。",questions:[{content:"x²-5x+3=0的两根x₁、x₂，求：①x₁+x₂ ②x₁x₂ ③x₁²+x₂² ④1/x₁+1/x₂",answer:"①5 ②3 ③19 ④5/3",sol:"①和=5②积=3③(x₁+x₂)²-2x₁x₂=25-6=19④(x₁+x₂)/(x₁x₂)=5/3",error:"韦达定理：和=-b/a，积=c/a"},{content:"方程x²+px+q=0的两根之差为2，两根之积为-3，求p和q",answer:"p=±2，q=-3（∵(x₁-x₂)²=(x₁+x₂)²-4x₁x₂=p²+12=4→p²=-8，矛盾；改：差绝对值=2，积=-3）",sol:"(x₁-x₂)²=4；(x₁+x₂)²-4x₁x₂=4；p²+12=4→p²=-8矛盾。若差=4：p²+12=16→p=±2；q=-3",error:"两根差的平方=(和)²-4×积=Δ/a²"},{content:"已知α、β是x²-3x+1=0的两根，求α³-4β²+α的值",answer:"利用α²=3α-1和β²=3β-1化简",sol:"α是根→α²=3α-1→α³=3α²-α=3(3α-1)-α=8α-3；β²=3β-1；原式=8α-3-4(3β-1)+α=9α-12β+1；又α+β=3，αβ=1，需α-β=？Δ=9-4=5>0，α-β=√5；α=(3+√5)/2，β=(3-√5)/2代入",error:"韦达定理结合整式变换"},{content:"方程kx²-(2k+1)x+k=0（k≠0）有两个不等实根，且两根都在(0,1)内，k的范围",answer:"k<-1/4（需完整分析）",sol:"Δ=(2k+1)²-4k²=4k+1>0→k>-1/4；两根在(0,1)：和=（2k+1)/k∈(0,2)，积=1... 需仔细讨论k正负",error:"两根都在区间内：Δ>0、f(0)>0、f(1)>0、对称轴在(0,1)内"}]},{id:"tg27",name:"相似三角形综合证明",topics:["similar","pythagorean","circle"],methods:["m04","m07","m15","m08"],diff:4,desc:"相似三角形的AA判定、SAS判定配合射影定理、圆的性质，是中考几何综合核心。",questions:[{content:"△ABC，∠BAC=90°，AD⊥BC于D，证：①△ABD∽△CAD ②AB²=BD×BC ③AD²=BD×DC",answer:"均由相似三角形比例推导",sol:"①∠ADB=∠CAD=90°，∠B=∠B→△ABD∽△CAD（AA）②AB/BC=BD/AB→AB²=BD×BC③AD/DC=BD/AD→AD²=BD×DC",error:"射影定理三个公式均由相似推导"},{content:"⊙O，AB为弦，C在优弧上，过C作切线交AB延长线于P，证PA²=PB×PC... 改：PA²=PB×PA不对，正确是PA²=PB×PC中P是切点外一点",sol:"切割线定理：PA切线，PBC割线→PA²=PB×PC",error:"切割线定理：切线长的平方=割线的外段×整段"},{content:"梯形ABCD，AD∥BC，∠B=90°，AB=BC=2，CD=2√2，E是CD中点，证△ABE∽△ECD，并求AE",answer:"相似比=1:1→AE=EC=CD/2=√2？需验证",sol:"∠ABE=∠ECD（需证）；设坐标B(0,0),C(2,0),A(0,2)；D(2+2,2)=D(4,2)... CD=√(4+4)=2√2✓；E(3,1)；AE=√(9+1)=√10；EC=√(1+1)=√2；△ABE∽△ECD需AA验证",error:"坐标法验证相似"},{content:"△ABC中，∠A=2∠B，D在BC上AD平分∠A，证△ABD∽△ACB",answer:"∠ABD=∠B，∠BAD=∠A/2=∠B，故△ABD等腰；∠DAC=∠A/2=∠B=∠ABD；∠C=∠C→△ADC∽△ACB（AA）",sol:"∠DAC=∠B，∠C公共→△ADC∽△ACB（AA）",error:"角平分线+倍角关系推相似"}]},{id:"tg28",name:"坐标系与函数综合",topics:["coords","linear_fn","quad_fn","inverse_fn"],methods:["m05","m22","m01","m16"],diff:4,desc:"坐标系中多种函数图像的交点、面积、参数综合，融合代数与几何的高频综合题。",questions:[{content:"一次函数y=kx+b经过A(1,2)和B(3,-2)，与坐标轴围成三角形面积=？",answer:"S=1",sol:"k=(-2-2)/(3-1)=-2；b=4；y=0→x=2；x=0→y=4；x截距2，y截距4；S=½×2×4=4... 重算：y=-2x+4；x=2（x截距），y=4（y截距）；S=½×2×4=4",error:"截距法求三角形面积：S=½|x截距|×|y截距|"},{content:"抛物线y=ax²+bx过A(1,2)和B(3,0)，求a和b；直线AB与抛物线围成面积（引导方法）",answer:"a=-1，b=3；y=-x²+3x",sol:"a+b=2；9a+3b=0→3a+b=0；解：2a=-2→a=-1，b=3；零点x=0和x=3；顶点(3/2,9/4)",error:"两点确定抛物线（过原点型）"},{content:"反比例y=k/x与y=x的交点，k>0时在哪些象限？交点坐标？",answer:"一三象限；(√k,√k)和(-√k,-√k)",sol:"k/x=x→x²=k→x=±√k；y=±√k；交点(√k,√k)和(-√k,-√k)",error:"联立两函数求交点"},{content:"坐标系中A(0,4)，B(3,0)，C是OA上一点OC=1，D是AB上一点使CD⊥AB，CD=？",answer:"CD=12/5",sol:"AB方向向量(3,-4)，AB长=5；CD⊥AB；D在AB上：设D=A+t(B-A)=(3t,4-4t)；CD=D-C=(3t,3-4t)；CD·AB=0：9t+(-4)(3-4t)=0→9t-12+16t=0→t=12/25；D=(36/25,52/25)；CD=√((36/25)²+(3-52/25)²)=√((36/25)²+(23/25)²)... 重算：C=(0,1)，CD⊥AB，用面积法：S△OAB=½×3×4=6；另S=½×AB×CD？不是这个三角形",error:"垂线段长度：用点到直线距离公式"}]},{id:"tg29",name:"不等式与函数综合",topics:["inequality","linear_fn","quad_fn"],methods:["m20","m21","m22","m11"],diff:4,desc:"不等式与函数图像的结合，从图像判断不等式解集，是中考解答题常见模型。",questions:[{content:"y=x²-2x-3，由图像写出：①y>0的x范围 ②y<0的x范围 ③|y|<3的x范围",answer:"①x<-1或x>3 ②-1<x<3 ③|x²-2x-3|<3→-3<x²-2x-3<3",sol:"零点x=-1，x=3；开口向上：①x<-1或x>3；②-1<x<3；③-3<x²-2x-3<3→下：x²-2x>0→x<0或x>2；上：x²-2x<6→-2<x<4；交集：-2<x<0或2<x<4",error:"二次不等式的解集读图"},{content:"不等式kx²-2x+k>0对所有实数x成立，k的范围",answer:"k>1",sol:"k=0：-2x>0→x<0，不恒成立；k≠0：开口向上且Δ<0；k>0且4-4k²<0→k>1",error:"恒成立：开口向上（k>0）且Δ<0"},{content:"直线y=x+m与抛物线y=x²-x+1只有一个公共点，m=？",answer:"m=-3/4",sol:"联立：x²-2x+1-m=0；Δ=4-4(1-m)=4m=0→m=0... 重算：x²-x+1=x+m→x²-2x+(1-m)=0；Δ=4-4(1-m)=4m=0→m=0",error:"Δ=0时直线与抛物线相切"},{content:"关于x的不等式x²-（a+2)x+2a<0（a为实数），讨论解集",answer:"(x-2)(x-a)<0，分a>2，a=2，a<2三种情况",sol:"因式分解：x²-(a+2)x+2a=(x-2)(x-a)；a>2：解集2<x<a；a=2：(x-2)²<0无解；a<2：a<x<2",error:"含参不等式：先因式分解再分情况讨论"}]},{id:"tg30",name:"圆的综合计算",topics:["circle","similar","trig","pythagorean"],methods:["m07","m04","m16","m03"],diff:5,desc:"圆的切线、弦长、弧长、扇形面积的综合计算，是中考压轴级题型。",questions:[{content:"⊙O，半径R=5，弦AB=8，过弦中点M作直径CD，求AC、AD、CM",answer:"CM=5-3=2（弦心距=3）；AC=？AD=？",sol:"弦心距OM=√(25-16)=3；CM=R-OM=2；DM=R+OM=8；△ACM：∠ACM=90°（直径所对）？不，∠ACD是圆周角...用坐标法：O原点，M(0,3)，A(-4,3)，C(0,5)，D(0,-5)；AC=√(16+4)=√20=2√5；AD=√(16+64)=√80=4√5",error:"圆中综合：弦心距+坐标法"},{content:"⊙O，PA切于A，PO=13，OA=5，B是PO与⊙O的另一交点，求PA、△PAB面积、∠APB",answer:"PA=12，OB=5，PB=8；S△PAB=½×PB×OA=？",sol:"PA=12；PB=PO-OB=13-5=8；AB是弦，OA⊥PA，在△PAO中S=½×OA×PA=½×5×12=30；但S△PAB与S△PAO关系：B在PO上，△PAB以AB为底，高=PA×sin∠APB；用另法：∠APB=arctan(OA/OP)... 直接面积：S△PAB=½×AB×h，h是P到AB距离",error:"切线长+面积综合"},{content:"两⊙O₁O₂外切，半径分别为3和5，公切线AB（A在⊙O₁，B在⊙O₂），AB=？",answer:"AB=2√15",sol:"O₁O₂=3+5=8；公切线AB⊥O₁A⊥O₂B；作O₁C⊥O₂B，C在O₂B延长线上；O₁C=AB，O₂C=O₂B-O₁A=5-3=2；O₁C²=O₁O₂²-O₂C²=64-4=60；AB=√60=2√15",error:"外切两圆公切线长=√(圆心距²-(R-r)²)"},{content:"扇形半径=10，圆心角=120°，求弧长和面积",answer:"弧长=20π/3，面积=100π/3",sol:"弧长=120/360×2π×10=20π/3；面积=120/360×π×100=100π/3",error:"弧长=（角/360°）×2πR；扇形面积=（角/360°）×πR²"}]},{id:"tg31",name:"解直角三角形应用",topics:["trig","pythagorean","coords"],methods:["m16","m03","m18"],diff:3,desc:"三角函数在实际测量中的应用：仰角俯角、坡度坡角、方位角，中考必考应用题型。",questions:[{content:"从楼顶A俯视地面B，俯角30°；从楼底C仰视B，仰角45°；BC=20m，楼高AC=？",answer:"AC=20(√3-1)m≈14.6m",sol:"设AC=h，AB水平距离=x；tan30°=h/（x+0）?... 俯角从A看B：tan30°=（h-0）/x... 俯角从楼顶看地面：tan30°=AC/（水平距离）；tan45°=BC/x=20/x→x=20；h=x×tan30°=20/√3=20√3/3... 但BC=20是斜距还是水平距离？若BC水平：AC=20tan45°=20",error:"俯仰角问题：确认距离是水平距离还是斜距"},{content:"山坡坡角α=30°，A在坡底，B在坡上AB=100m，从B处垂直山坡方向立电线杆BC=5m，电线杆顶C到A的距离",answer:"AC=√(AB²+BC²+2AB×BC×cos(90°+α))=√(10000+25-1000√3)≈86.6m",sol:"∠ABC=90°+30°=120°（坡角延伸）；AC²=100²+5²-2×100×5×cos120°=10025+500=10525；AC≈102.6m",error:"坡面上的三角形：注意各角与坡角的关系"},{content:"某人站在河边A，对岸B正对面，沿岸走50m到C，测∠ACB=30°，河宽AB=？",answer:"AB=50tan30°=50√3/3≈28.9m",sol:"∠ABC=90°（AB⊥河岸），∠ACB=30°；tan30°=AB/AC=AB/50；AB=50tan30°=50/√3",error:"直角三角形：tan角=对边/邻边"},{content:"从船A测灯塔B，北偏东60°，行驶10km到C后，测灯塔B在正东方，求BC和AB",answer:"BC=5km，AB=5√3km",sol:"∠BAC=60°（北偏东），∠BCN=90°（正东→∠BCA=90°）；AC=10；sin60°=BC/AC→BC=10sin60°=5√3... 重算：A→C向南（沿岸），B在正东，∠BAC=60°，∠BCA=90°（B正东）；tan∠BAC=BC/AC→BC=10tan60°=10√3，AB=10/cos60°=20",error:"方位角转化为直角三角形模型"}]},{id:"tg32",name:"整式与因式分解综合",topics:["poly","factoring","reals"],methods:["m06","m02","m23"],diff:3,desc:"整式运算和因式分解的综合题，包括化简求值、条件代换等中考常见题型。",questions:[{content:"已知x+y=3，xy=1，求x³y-x²y²+xy³；x²+y²；(x-y)²",answer:"xy(x²-xy+y²)=1×(9-2-1)=6；x²+y²=7；(x-y)²=5",sol:"x²+y²=(x+y)²-2xy=9-2=7；(x-y)²=x²+y²-2xy=7-2=5；x³y-x²y²+xy³=xy(x²-xy+y²)=1×(7-1)=6",error:"整式运算转化为和与积的表达式"},{content:"化简：(a²-b²)/(a-b)÷(a+b)²/(a²-ab)·a/(a²-b²)",answer:"a/(a+b)²",sol:"(a+b)(a-b)/(a-b)÷(a+b)²/(a(a-b))·a/((a+b)(a-b))；展开：(a+b)·a(a-b)/((a+b)²(a-b))·a/((a+b)(a-b))；化简得a²/((a+b)³(a-b))... 需重新整理",error:"分式混合运算：先变除为乘，再约分"},{content:"若a-b=2，ab=-3，求a³b-a²b²+ab³",answer:"ab(a²-ab+b²)=(-3)×((a-b)²+ab)=(-3)×(4-3)=-3",sol:"a²+b²=(a-b)²+2ab=4-6=-2... 但a²+b²≥0，矛盾！改：a+b=2，ab=-3；a²+b²=(a+b)²-2ab=4+6=10；a²-ab+b²=10-(-3)=13；ab×13=-39",error:"条件代入时注意正确应用公式"},{content:"已知x=√3+1，y=√3-1，求x²y-xy²和x³-y³",answer:"x²y-xy²=xy(x-y)=2×2=4；x³-y³=(x-y)(x²+xy+y²)=2×(4+2+4)=20？",sol:"x+y=2√3，x-y=2，xy=(√3+1)(√3-1)=2；x²+y²=(x+y)²-2xy=12-4=8；x²y-xy²=xy(x-y)=2×2=4；x³-y³=2×(8+2)=20",error:"先求x+y、x-y、xy，再代入公式"}]},{id:"tg33",name:"动点问题专题",topics:["quad_fn","linear_fn","coords","similar"],methods:["m05","m04","m22","m16"],diff:5,desc:"动点问题是中考几何+代数的综合压轴题，考查将几何量用代数参数表达并求最值。",questions:[{content:"线段AB=6，P在AB上，AP=x（0<x<6），以AP和PB为边作正方形，两正方形面积之和S关于x的函数，S最小值=？",answer:"S=x²+(6-x)²=2x²-12x+36；最小在x=3：S=2×9-36+36=18",sol:"顶点x=12/4=3；S(3)=18；两正方形各边=3，面积各9",error:"动点问题：建立代数表达式，再求顶点"},{content:"△ABC，BC=10，高AD=6，P在BC上，以BP为直径的⊙O与AD交于Q，BQ=？（用BP=x表示）",answer:"需圆方程+直线交点，BQ是复杂函数",sol:"以BP中点为圆心，BP/2为半径；AD是高，D在BC上；设坐标B(0,0),C(10,0),D(d,0),A(d,6)；以BP中点(x/2,0)为圆心，半径x/2；Q在AD（x=d）和圆的交点",error:"圆与直线的交点坐标"},{content:"矩形ABCD，AB=3，BC=4，E在BC上BE=t（0<t<4），△ADE中，t=？时△ADE面积最大",answer:"△ADE面积=S矩形-△ABE-△ADE+△CDE... 直接用坐标",sol:"A(0,4),B(0,0),C(3,0),D(3,4)；E(0,t)在AB不对，E在BC上：E(t,0)... 设E(t,0)在BC（0≤t≤3）；△ADE：A(0,4),D(3,4),E(t,0)；面积=½|3×(4-0)-t×(4-4)+0×(0-4)|=½|12|=6（与t无关）？用正确公式",error:"坐标法求动点三角形面积"},{content:"⊙O，半径=5，弦AB=6，P在弦AB上（AP=t），以OP为直径的圆与⊙O交两点，当t=？时两圆公共弦最长",answer:"当OP⊥AB时公共弦最长，即P为AB中点，OP=4（弦心距）",sol:"弦心距OM=4（弦长6，半径5）；P在AB上AP=t；OP²=OM²+(t-AM)²=16+(t-3)²；OP最短（=4）时t=3（P为中点）；公共弦最长时OP最短",error:"两圆公共弦最长→圆心距最短"}]},{id:"tg34",name:"实数与绝对值综合",topics:["rational","reals","inequality"],methods:["m10","m14","m19","m13"],diff:3,desc:"绝对值不等式、根式化简、实数的大小比较，中考填空题常见综合题型。",questions:[{content:"|2x-1|≤3的解集",answer:"-1≤x≤2",sol:"-3≤2x-1≤3；-2≤2x≤4；-1≤x≤2",error:"绝对值不等式：|A|≤B等价于-B≤A≤B"},{content:"若|a-3|+√(b+2)=0，求a²+b²",answer:"a=3，b=-2；a²+b²=13",sol:"绝对值≥0，根号≥0，和=0→各=0；a=3，b=-2",error:"非负数和=0→各自=0"},{content:"比较大小：√7-√5 与 √5-√3",answer:"√7-√5>√5-√3",sol:"作差：(√7-√5)-(√5-√3)=√7+√3-2√5；(√7+√3)²=10+2√21；(2√5)²=20；10+2√21 vs 20；2√21 vs 10；√21 vs 5；21>25？21<25，所以√21<5，即√7+√3<2√5，故√7-√5<√5-√3",error:"根式大小比较：作差后平方"},{content:"已知实数a、b满足a>0，b<0，|a|<|b|，化简|a-b|+|a+b|",answer:"2|b|=−2b",sol:"a>0,b<0,|a|<|b|→a>0,b<0,-b>a；a-b>0→|a-b|=a-b；a+b：a<-b→a+b<0→|a+b|=-(a+b)=−a-b；和=a-b-a-b=-2b（b<0故-2b>0）",error:"绝对值化简：先判断内部表达式的正负"}]},{id:"tg35",name:"中考综合模拟",topics:["quad_fn","circle","similar","stats"],methods:["m01","m07","m04","m09"],diff:5,desc:"模拟中考压轴题结构：选择+填空+解答，融合多个知识点，全面检验学习成果。",questions:[{content:"【选择】抛物线y=x²-4x+3与直线y=x-1的公共点个数：A.0  B.1  C.2  D.3",answer:"C（两个交点）",sol:"联立：x²-5x+4=0；(x-1)(x-4)=0；x=1或x=4；两个交点",error:"联立求交点个数：看判别式或直接解"},{content:"【填空】⊙O，弦AB=6，PA切⊙O于A，PB是割线交⊙O于C，PB=9，PC=？",answer:"PC=4",sol:"切割线定理：PA²=PB×PC；PA²=?需PA；先用PA²=PB×PC... 已知弦AB=6，PA切点，需更多信息。改：PA=6，PB=9→PC=PA²/PB=4",error:"切割线定理：PA²=PB×PC"},{content:"【解答第一问】△ABC，∠ACB=90°，AC=3，BC=4，AB上的高CD=？△ACD和△CBD的面积之比=？",answer:"CD=12/5；面积比=9:16",sol:"AB=5；CD=AC×BC/AB=12/5；S△ACD/S△CBD=AD/DB=AC²/BC²=9/16",error:"射影定理：CD=AC×BC/AB；AD=AC²/AB；DB=BC²/AB"},{content:"【解答第二问】在上题基础上，以CD为直径作圆，圆与AB有几个交点？圆过C和D，与AB的关系？",answer:"D在AB上，CD⊥AB，以CD为直径的圆过D且切AB（∠CDA=90°说明A在圆外，圆切AB于D）",sol:"圆以CD为直径，圆上的点对CD所张圆周角=90°；D在AB上，∠CDA=90°→D是切点；圆与直线AB相切于D",error:"直径所对圆周角=90°→切线判定"}]}],La=[{id:"fg01",name:"二次函数压轴Ⅰ：顶点面积最值",topics:["quad_fn","linear_fn","coords"],methods:["m01","m04","m21","m22"],diff:5,desc:"最高频压轴模型：抛物线+直线+面积最大值，几乎每年必出。",questions:[{content:"已知抛物线y=x²-2x-3，顶点A，与x轴交B(-1,0)和C(3,0)，直线l过A，交BC延长线于点P，使S△ABP最大，求直线l方程及最大面积",answer:"l:y=-4（水平线），最大面积=4",sol:"顶点A(1,-4)；底BC=4；P在BC延长线上，设P(p,0)，p>3；S△ABP=½|BP|×|y_A|=½(p+1)×4=2(p+1)...随p增大面积增大，P越远越大，需约束条件——重读题：直线l过顶点A且交BC段，求面积最大",error:"面积最值需要正确理解P的范围，或用导数（初中用配方）"},{content:"抛物线y=-x²+bx+c经过A(0,3)和B(4,3)，顶点P，Q在y轴上，AQ=PQ，求Q坐标",answer:"需完整计算：b=-(-4+0)/(需代入)...",sol:"过A(0,3)：c=3；过B(4,3)：-16+4b+3=3→b=4；y=-x²+4x+3；顶点P(2,7)；Q在y轴上，设Q(0,q)；AQ=|q-3|；PQ=√(4+(q-7)²)；令AQ=PQ解方程",error:"等距点在线段垂直平分线上，或直接联立方程"},{content:"y=ax²+bx+c（a>0），对称轴x=1，过A(0,3)，与x轴交B和C，若S△BOC=3，求a",answer:"a=1/3（需详细计算）",sol:"b=-2a（由对称轴）；c=3（由A）；令y=0：ax²-2ax+3=0；x₁+x₂=2，x₁x₂=3/a；|BC|=|x₂-x₁|=√((x₁+x₂)²-4x₁x₂)=√(4-12/a)；S=½×|BC|×3=3→|BC|=2→√(4-12/a)=2→a=3",error:"弦长公式+面积方程联立求参数"}]},{id:"fg02",name:"二次函数压轴Ⅱ：动点与坐标",topics:["quad_fn","coords","similar"],methods:["m16","m04","m05"],diff:5,desc:"动点在抛物线上运动，坐标变化，面积或距离随之变化的最值问题。",questions:[{content:"抛物线y=x²-4x+3，点P在抛物线上，O为原点，|OP|最小时P的坐标",answer:"需完整计算",sol:"设P(t,t²-4t+3)；|OP|²=t²+(t²-4t+3)²；对t求导令导数=0（初中用配方或其他方法）",error:"|OP|²是关于t的函数，求最值"},{content:"抛物线C:y=x²-2x-3，A(-1,0)，B(3,0)，P为C上一动点，当S△PAB最大时，P的坐标",answer:"P(1,-4)，最大面积=8",sol:"底AB=4；S△PAB=½×4×|y_P|；y_P=x²-2x-3在A和B之间（-1≤x≤3）的最小值（最大|y_P|）；顶点(1,-4)，|y|=4；S=½×4×4=8",error:"底固定，最大面积时高最大，即|y_P|最大"}]},{id:"fg03",name:"圆的综合压轴Ⅰ：切线与弦",topics:["circle","similar","pythagorean"],methods:["m03","m07","m15","m04"],diff:5,desc:"切线证明+弦长计算+圆周角的综合大题，每年必出。",questions:[{content:"⊙O中，AB为直径，C是⊙O上一点（不与A,B重合），CD⊥AB于D，P为弧BC（不含A）上一点，PC交AB于E，求证：PA·PB=PE·PC",answer:"由相似三角形或圆的切割线定理证明",sol:"∠PAB=∠PCA（同弧CB圆周角等于？需分析）；∠APB=90°（直径所对）；△PAE∽△PCB？需具体分析角度关系建立相似",error:"圆的综合证明：先寻找相等的角（同弧圆周角，切线角等）"},{content:"⊙O半径=5，弦AB=8，C是弧AB（优弧）上一点，∠ACB=？OC⊥AB于D，D坐标（以O为原点）=？",answer:"∠ACB=arcsin(4/5)（约53.13°？需用圆心角/2）；D在AB的中点",sol:"弦心距OD=√(25-16)=3；∠AOB：sin(∠AOB/2)=4/5，∠AOB/2≈53°，∠AOB≈106°；∠ACB=∠AOB/2≈53°（C在优弧上）；D为AB中点",error:"弦心距到弦、圆周角定理综合计算"},{content:"PA切⊙O于A，PO的延长线交⊙O于B和C（B在O和C之间），PA=4√3，PB=4，求⊙O半径R",answer:"R=4",sol:"切割线定理：PA²=PB×PC；48=4×PC；PC=12；BC=PC-PB=8；R=BC/2=4",error:"切割线定理：外点到切点距离的平方=割线两段乘积"}]},{id:"fg04",name:"圆的综合压轴Ⅱ：圆内接四边形",topics:["circle","quadrilateral","similar"],methods:["m07","m08","m03","m15"],diff:5,desc:"圆内接四边形的角度、面积和相似，综合难度最高的圆题型。",questions:[{content:"⊙O中，ABCD为内接四边形，AB为直径，∠ACD=25°，∠ABD=？∠CAD=？",answer:"∠ABD=25°（同弧AD圆周角相等），∠CAD=90°-25°=65°",sol:"∠ACD和∠ABD都是对弧AD的圆周角→∠ABD=∠ACD=25°；∠ADB=90°（AB直径所对）；∠CAD=90°-25°=65°",error:"同弧圆周角相等；直径所对圆周角=90°"},{content:"⊙O中，弦AB∥弦CD，AB=8，CD=6，两弦间距=7，求⊙O半径",answer:"R=5",sol:"设弦心距到AB为d₁，到CD为d₂，d₁+d₂=7（或d₂-d₁=7，看同侧还是异侧）；d₁²+(8/2)²=R²→d₁²+16=R²；d₂²+(6/2)²=R²→d₂²+9=R²；d₁²-d₂²=7联立解出R",error:"平行弦的弦心距关系，分同侧和异侧讨论"}]},{id:"fg05",name:"相似三角形压轴：比例综合",topics:["similar","quadrilateral","coords"],methods:["m04","m15","m18","m16"],diff:5,desc:"相似比例在四边形、坐标系中的综合应用，面积比是最终考察目标。",questions:[{content:"平行四边形ABCD中，E在BC上，AE交BD于F，BE:EC=1:2，S△ABF:S△ADF=？",answer:"1:2",sol:"△ABF∽△EBF?不对；用△ABF和△ADF共底AF；S△ABF/S△ADF=BF/FD；△ABF∽△DEF（AA）→BF/FD=AB/ED=AB/(DC-BE)=3/2？需仔细分析比例关系",error:"平行四边形中对角线比例，需用相似三角形建立比例关系"},{content:"△ABC中，D在AC上，E在BC上，DE∥AB，△DEC面积=4，△ABC面积=16，DE:AB=？CD:CA=？",answer:"DE:AB=1:2，CD:CA=1:2",sol:"面积比=4:16=1:4；相似比=1:2；DE:AB=1:2；CD:CA=1:2",error:"相似三角形面积比=相似比²，反推相似比"},{content:"Rt△ABC，∠C=90°，AC=3，BC=4，D是AB上一点，且CD⊥AB，E是AC上一点，DE∥BC，求DE和AE",answer:"CD=12/5，AE=9/5，DE=12/5×3/5=？需仔细计算",sol:"AB=5；CD=AC×BC/AB=12/5；AD=AC²/AB=9/5；△ADE∽△ACB：DE/CB=AD/AC→DE/4=(9/5)/3=3/5→DE=12/5",error:"射影定理+相似比例"}]},{id:"fg06",name:"动点综合：面积与坐标函数",topics:["quad_fn","linear_fn","coords"],methods:["m21","m16","m04","m19"],diff:5,desc:"动点题是中考最难的综合题，面积随参数变化，需建立函数关系。",questions:[{content:"△ABC，A(0,4)，B(-2,0)，C(2,0)，P在BC上，设BP=t（0<t<4），S△ABP关于t的函数表达式",answer:"S=t（当P在BC上，面积随t线性变化）",sol:"BP=t，B(-2,0)，C(2,0)，BC=4；P(-2+t,0)；底=BP=t；高=A到BC（x轴）距离=4；S=½×t×4=2t",error:"动点在线段上，用参数t表示坐标"},{content:"矩形ABCD，AB=4，BC=3，P在AB上，Q在BC上，AP=BQ=t（0<t<3），S△APQ关于t的表达式，最小值",answer:"S=½t²（需验证）；最小值t→0时趋向0，但t>0，需查看是否有约束",sol:"A(0,0)，B(4,0)，C(4,3)，D(0,3)；P(t,0)（AP=t）；Q(4,t)（BQ=t，Q在BC上从B算）；S△APQ=½|AP×AQ|...用坐标面积公式",error:"动点在矩形两边上，用坐标面积公式"},{content:"一次函数y=2x-4，点A在直线上，B在x轴正半轴上，OA=OB（O为原点），S△OAB关于OA长度m的表达式",answer:"需完整建模",sol:"设A(a,2a-4)，OA=m→a²+(2a-4)²=m²；B(m,0)（OB=m=OA）；S△OAB=½|OB|×|y_A|=½m×|2a-4|",error:"等距条件建方程，然后表示面积"}]},{id:"fg07",name:"数列与规律（中考新增类型）",topics:["rational","stats"],methods:["m09","m13","m23"],diff:4,desc:"找规律、数列求和、图形数列是近年中考创新题型。",questions:[{content:"数列：1,4,9,16,25...（完全平方数），第n项=？前n项和Sn=？",answer:"第n项=n²；Sn=n(n+1)(2n+1)/6",sol:"观察规律：第n项=n²；求和公式需用数列求和（初中通常用归纳法验证）",error:"识别数列规律后写通项，求和需要特定公式"},{content:"图形规律：第1个图形有3根火柴，每增加一个正方形需加3根，第n个图形需多少根？",answer:"3n+1根（需根据具体图形）",sol:"第1个：1个正方形=4根；第2个：增加1个=4+3=7根；第n个：3n+1根",error:"找递推规律：每增加一个图形增加几根"},{content:"等差数列3,7,11,15...公差d=？第10项=？前10项和=？",answer:"d=4；第10项=39；S₁₀=210",sol:"d=7-3=4；第n项=3+(n-1)×4=4n-1；第10项=39；Sn=n×(首项+末项)/2=10×(3+39)/2=210",error:"等差数列：公差d，通项公式，前n项和公式"}]},{id:"fg08",name:"综合证明：多条件多步推导",topics:["congruent","similar","circle"],methods:["m07","m08","m15","m03"],diff:5,desc:"多条件的复杂几何证明，需要分步建立中间结论，层层递进。",questions:[{content:"⊙O中，AB为直径，C在圆上，DE切⊙O于C，DE∥AB，证明AC=BC",answer:"由DE∥AB和切线性质证明",sol:"DE∥AB→∠DAB=∠CDA（同位角）？或：DE∥AB→弧AC=弧BC（平行弦截等弧）→AC=BC（等弧对应等弦）",error:"平行弦截等弧→等弦，是关键步骤"},{content:"△ABC，∠BAC=90°，∠B=60°，BD是∠B的角平分线，交AC于D，E是AD的中点，求BE",answer:"BE=AB/2（需完整推导）",sol:"∠BAC=90°，∠B=60°→∠C=30°；BD平分∠B→∠ABD=30°=∠C→△ABD等腰→AD=AB；E是AD中点→DE=AB/2；在△BDE中...需继续",error:"角平分线→等腰三角形，然后利用中点"},{content:"已知△ABC≅△A'B'C'，M是BC中点，M'是B'C'中点，证AM=A'M'",answer:"由全等推出BC=B'C'，BM=B'M'，AB=A'B'，∠B=∠B'，SAS→△ABM≅△A'B'M'→AM=A'M'",sol:"△ABC≅△A'B'C'→AB=A'B'，BC=B'C'，∠B=∠B'；BM=B'M'（各是BC,B'C'中点）→△ABM≅△A'B'M'（SAS）→AM=A'M'",error:"由全等三角形推出全等三角形（利用中点创造新的全等条件）"}]},{id:"fg09",name:"坐标系综合：直线与曲线",topics:["quad_fn","linear_fn","coords","equations"],methods:["m16","m22","m20","m05"],diff:5,desc:"坐标系中直线与抛物线的位置关系、参数求解和几何量计算。",questions:[{content:"在坐标系中，一次函数y=kx+b（k>0）与二次函数y=x²-2x+3，当这两个函数的图像相切时，求k和b",answer:"k=0（切线斜率），需Δ=0",sol:"联立：x²-2x+3=kx+b→x²-(2+k)x+(3-b)=0；相切→Δ=0：(2+k)²-4(3-b)=0；还差一个方程（切线条件：斜率=导数），初中一般给具体条件",error:"相切意味着Δ=0，但还需切点处斜率等于k（高中知识）"},{content:"直线y=x+m与抛物线y=x²-1，若有两个交点且都在x轴上方（y>0），求m的范围",answer:"需两交点都满足y>0",sol:"联立：x²-1=x+m→x²-x-(1+m)=0；两实根：Δ=1+4(1+m)>0→m>-5/4；两根对应的y=x+m>0；y>0时x>-m；需两根都>-m，用韦达定理",error:"分两步：先保证有两交点（Δ>0），再保证两交点都在x轴上方"},{content:"抛物线y=2x²+bx+c，与x轴交点横坐标之和=3，积=1，求抛物线解析式，顶点，和与y轴交点",answer:"b=-6，c=2；顶点(3/2,-1/2)；y轴交点(0,2)",sol:"韦达：x₁+x₂=-b/2=3→b=-6；x₁x₂=c/2=1→c=2；y=2x²-6x+2；顶点x=3/2，y=9/2-9+2=-1/2；y轴：x=0，y=2",error:"用韦达定理由根的关系直接求系数"}]},{id:"fg10",name:"综合应用压轴：优化决策",topics:["linear_fn","quad_fn","stats"],methods:["m20","m21","m17","m09"],diff:5,desc:"将实际优化问题建立数学模型，综合运用函数、方程、统计知识。",questions:[{content:"某商品每件成本50元，售价x元（x>50），日销量y件，y=200-2x。求日利润W关于x的函数，并求最大利润和最优售价",answer:"最大利润=1250元，最优售价=75元",sol:"W=(x-50)(200-2x)=-2x²+300x-10000=-2(x-75)²+1250；顶点x=75，W_max=1250",error:"利润=(售价-成本)×销量，建立关于售价的二次函数"},{content:"某公司今年利润500万元，计划每年增长率相同，5年后利润不低于1000万元，年增长率至少是多少？",answer:"r≥(2^(1/5))-1≈14.9%",sol:"500(1+r)^5≥1000；(1+r)^5≥2；用计算或估算：1.1^5≈1.61，1.15^5≈2.01≈2→r≈15%",error:"指数增长模型：初始×(1+r)^n≥目标"},{content:"如图，梯形ABCD，AB∥CD，∠B=90°，AB=12，BC=8，CD=6，E在BC上，矩形BEPF中F在AD上，当矩形BEPF面积最大时，BE=？",answer:"BE=4，最大面积=24",sol:"设BE=t，EF∥AB；F在AD上，EF=AB-（F到D的水平距离）；用相似：EF/AB=（BC-t）/BC？...需详细几何分析",error:"梯形内的矩形面积最值：用相似三角形建立EF与t的关系"}]},{id:"fg11",name:"二次函数压轴Ⅲ：动点与面积",topics:["quad_fn","linear_fn","coords","similar"],methods:["m01","m04","m22","m16"],diff:5,desc:"动点在抛物线上运动，面积关于参数的函数求最值，是中考最高频压轴模型之一。",questions:[{content:"抛物线y=x²-4x+3，A(1,0)，B(3,0)，顶点C。P是抛物线上一动点（在AB下方），S△PAB关于P的x坐标t的函数是什么？面积最大值是多少？",answer:"S=½×AB×|y_P|=½×2×|t²-4t+3|；t∈(1,3)时y<0；S=-(t²-4t+3)=-(t-2)²+1；最大S=1（t=2时）",sol:"AB=2；P(t,t²-4t+3)，t∈(1,3)，y_P<0；S=½×2×|y_P|=|y_P|=-(t²-4t+3)=-(t-2)²+1；最大=1",error:"底固定，面积最大时高最大→在顶点处"},{content:"抛物线y=-x²+2x+3，A(-1,0)，B(3,0)，P在弧AB上，Q是P在AB上的投影，PQ最大时P坐标和PQ长度",answer:"P(1,4)，PQ=4",sol:"顶点(1,4)在A、B之间，且在AB上方；PQ=y_P=-（-x²+2x+3）的最大值=4（开口向下，顶点最大）",error:"抛物线弧上的点到x轴距离最大→顶点"},{content:"y=x²-2x，A(0,0)，B(2,0)，C在抛物线上C(t,t²-2t)，t∈(0,2)外，直线AC与直线BC围成△ABC，S△ABC关于t的函数（t>2）",answer:"S=½|AB|×|y_C|=½×2×|t²-2t|=t²-2t（t>2时y>0）",sol:"AB=2；C(t,t²-2t)，t>2时y_C=t²-2t>0；S=½×2×(t²-2t)=t²-2t；单调递增，无最大值",error:"动点在抛物线延伸段，面积随t增大"}]},{id:"fg12",name:"圆与切线压轴",topics:["circle","similar","pythagorean","trig"],methods:["m07","m04","m03","m16"],diff:5,desc:"圆的切线、割线、弦切角综合压轴，融合相似证明与计算，是中考几何最难题型。",questions:[{content:"⊙O，PA切⊙O于A，PBC为割线（B,C在圆上，B在P和C之间），PA=6，PB=4，求PC；若∠P=60°，求⊙O半径R",answer:"PC=9；R=3√3",sol:"切割线定理：PA²=PB×PC；36=4×PC；PC=9；BC=5；∠P=60°，在△PAO中：∠OAP=90°，PA=6，∠P=60°→tan60°=OA/PA？不对，∠OAP=90°；OA/OP=sin60°→OA=OP×sin60°；OP=PA/cos60°=12；OA=12×sin60°=6√3... 需重算：PA=OA/tan∠AOP，∠AOP=90°-60°=30°... 用PA²=PB×PC：OA²=OP²-PA²=OP²-36；OB=OC=R；PB=PO-R=OP-R=4；PC=PO+R=OP+R=9→OP=13/2+... 不整。用PB=PO-R，PC=PO+R：(PO-R)(PO+R)=PA²=36；PO²-R²=36；PB=4，PC=9→PO-R=4，PO+R=9→PO=6.5，R=2.5",error:"切割线定理+切线角求圆心距和半径"},{content:"⊙O，直径AB=10，弦CD⊥AB于E，弦CD=8，PA切⊙O于A，PD连线交AB延长线于F，证PA=PF",answer:"PA=PF（PA是切线，PF需证等于切线长）",sol:"∠OAP=90°；E是CD弦心距：OE=√(25-16)=3；OA=5；∠OAP=90°，PA²=PO²-OA²；需确定P位置；另：∠DAB=∠FAD（切线角=弦切角=圆周角）→△DAP≅△某△",error:"切线与弦的角度关系证明等线段"},{content:"⊙O₁和⊙O₂外切于P，公切线AB（A在⊙O₁，B在⊙O₂），过P作公切线CD，证：C是AB的中点且∠APB=90°",answer:"CP=CA（切线长相等），CP=CB（同理）→CA=CB，C是中点；∠APB=90°因为PA⊥PB…",sol:"过P对⊙O₁切线：CP=CA（同一点的切线长）；过P对⊙O₂切线：CP=CB；∴CA=CB；∠APC+∠BPC=180°（C、P、AB的关系）；∠APB=90°：∠PAB=∠PBA=45°？",error:"两圆公切线+切线长定理的综合证明"}]},{id:"fg13",name:"相似与面积比压轴",topics:["similar","quadrilateral","coords","pythagorean"],methods:["m04","m15","m16","m04"],diff:5,desc:"相似三角形的比例关系结合面积比，是中考几何综合题的核心模型。",questions:[{content:"△ABC，D在BC上，AD平分∠BAC，AB=6，AC=4，BC=5，BD=？DC=？",answer:"BD=3，DC=2",sol:"角平分线定理：BD/DC=AB/AC=6/4=3/2；BD+DC=5；BD=3，DC=2",error:"角平分线定理：BD/DC=AB/AC"},{content:"梯形ABCD，AD∥BC，AD=2，BC=4，对角线AC、BD交于O，△AOD面积=S，△BOC面积=？梯形面积=？",answer:"S△BOC=4S；梯形面积=9S",sol:"△AOD∽△COB（AA）；相似比AD/BC=1/2；面积比1:4；S△BOC=4S；△AOB和△DOC面积各为2S（等底等高）；梯形=S+2S+4S+2S... △AOB=△DOC（等底等高：同底BC和AD，高相同）；实际S△AOB=S△DOC=2S（几何中间）；梯形=S+2S+4S+2S=9S",error:"对角线分割梯形为4个三角形，面积关系"},{content:"△ABC，∠A=90°，AB=3，AC=4，BC=5，D在BC上BD=2，E在AC上，DE∥AB，EF⊥BC于F，求EF",answer:"EF=12/5",sol:"DE∥AB：△CDE∽△CBA；CD=3，DC/BC=3/5；DE/AB=3/5；DE=9/5；CE/AC=3/5；CE=12/5；EF⊥BC：△EFC中EF=EC×sin∠C=12/5×4/5=48/25... 重算：EF是E到BC的垂线；E在AC上CE=12/5；EF⊥BC，在直角三角形EFC中sin∠C=EF/EC=4/5；EF=CE×4/5=48/25",error:"利用相似确定各线段长，再在直角三角形中求高"}]},{id:"fg14",name:"代数综合压轴",topics:["quad_eq","linear_fn","inequality","factoring"],methods:["m01","m11","m06","m20"],diff:5,desc:"代数压轴：二次函数参数、根的讨论、含参不等式，综合运用判别式和韦达定理。",questions:[{content:"关于x的方程x²-（2m+1)x+m²+m=0，讨论：①两根都是正数的m范围 ②一正一负根的m范围",answer:"①m>0且m≠-1 ②m<-1（积<0）",sol:"分解：(x-m)(x-(m+1))=0；根x=m和x=m+1；①都正：m>0且m+1>0→m>0；②一正一负：m(m+1)<0→-1<m<0... 等一下：一正一负：m×(m+1)<0（一个正一个负）→-1<m<0→一个根=-1<0另一个=m，即m∈(-1,0)时一负一正",error:"因式分解后直接得根，分情况讨论"},{content:"y=ax²+bx+c（a≠0），已知①a+b+c<0 ②4a+2b+c>0 ③c>0，判断：f(1)、f(2)、f(0)的正负，并说明抛物线与x轴交点情况",answer:"f(0)=c>0；f(1)=a+b+c<0；f(2)=4a+2b+c>0；f(1)<0且f(0)>0→(0,1)间有零点；f(1)<0且f(2)>0→(1,2)间有零点；两个零点",sol:"由零点存在性：f(0)和f(1)异号→[0,1]内有根；f(1)和f(2)异号→[1,2]内有根；共两个实根，Δ>0",error:"由函数值正负判断零点的位置"},{content:"m为整数，方程x²-mx-2=0的两根x₁、x₂均为整数，求所有可能的m值",answer:"m=±1",sol:"x₁×x₂=-2（韦达：积=c/a=-2）；整数积=-2：(1,-2)(-1,2)(2,-1)(-2,1)；和=m；1+(-2)=-1→m=-1；(-1)+2=1→m=1；2+(-1)=1→m=1；(-2)+1=-1→m=-1；m=±1",error:"韦达定理：积为整数且已知，列举所有整数对"}]},{id:"fg15",name:"几何变换压轴",topics:["transform","congruent","similar","coords"],methods:["m03","m16","m15","m04"],diff:5,desc:"旋转、对称、平移结合坐标，是中考压轴题中最综合的几何变换题型。",questions:[{content:"正方形ABCD边长=2，以D为中心将△DAB旋转90°（逆时针）得△DA'B'，求B'坐标（D在原点，A在x轴正方向）",answer:"B'(-2,2)",sol:"D(0,0)，A(2,0)，B(2,2)；逆时针90°：(x,y)→(-y,x)；A→A'(0,2)；B→B'(-2,2)",error:"旋转公式：逆时针90°(x,y)→(-y,x)"},{content:"△ABC，∠ACB=90°，AC=BC=1，将△ABC绕C旋转60°得△A'B'C，求AA'的长度",answer:"AA'=1",sol:"AC=A'C=1（旋转保持距离）；∠ACA'=60°；由余弦定理：AA'²=1+1-2cos60°=1；AA'=1",error:"旋转后两点距离：用余弦定理，角=旋转角"},{content:"P(2,1)关于直线y=x+1的对称点P'，求P'坐标",answer:"P'(0,3)",sol:"PP'⊥y=x+1（斜率=-1）；PP'中点在直线y=x+1上；设P'(a,b)：中点((2+a)/2,(1+b)/2)在直线上：(1+b)/2=(2+a)/2+1→1+b=2+a+2→b=a+3；斜率PP'=(b-1)/(a-2)=-1→b-1=-(a-2)→b=3-a；联立：3-a=a+3→a=0，b=3；P'(0,3)",error:"关于直线对称：中点在直线上+PP'⊥直线"}]},{id:"fg16",name:"函数与方程综合压轴",topics:["quad_fn","quad_eq","linear_fn","coords"],methods:["m01","m11","m22","m05"],diff:5,desc:"二次函数与直线的位置关系、参数范围、交点个数，是代数压轴的核心题型。",questions:[{content:"抛物线y=x²+bx+c，与直线y=x-1相切（只有一个公共点），且过点(0,-3)，求b和c，并写出切点坐标",answer:"c=-3；联立：x²+(b-1)x+(-3+1)=0即x²+(b-1)x-2=0；相切Δ=(b-1)²+8=0→无解。改：y=x²+bx+c与y=x相切：x²+(b-1)x+c=0；Δ=(b-1)²-4c=0；过(0,-3)：c=-3；(b-1)²+12=0无实解。再改：过(0,1)：c=1；Δ=(b-1)²-4=0→b-1=±2→b=3或b=-1",sol:"c=1（过(0,1)）；Δ=0→b=3或b=-1；b=3时切点x=(1-b)/2=-1，y=-2；b=-1时x=1，y=2",error:"相切条件Δ=0+代点确定参数"},{content:"已知f(x)=x²-2ax+a²-1（a为实数），f(x)<0有解，求a的范围",answer:"f(x)=(x-a)²-1；最小值=-1<0，所以f(x)<0恒有解，对所有a成立",sol:"顶点纵坐标=a²-1-a²=-1<0；顶点在x轴下方，所以f(x)<0必有解；a为任意实数",error:"顶点纵坐标=-1<0→开口向上的抛物线必有部分在x轴下方"},{content:"直线y=kx+1与抛物线y=x²-2x+2，当直线与抛物线相交时，k的范围",answer:"k≤-2或k≥2",sol:"联立：x²-(k+2)x+1=0；有实数根：Δ=(k+2)²-4≥0；|k+2|≥2；k+2≥2或k+2≤-2；k≥0或k≤-4... 重算：x²-2x+2=kx+1→x²-(k+2)x+1=0；Δ=(k+2)²-4≥0→k≥0或k≤-4",error:"直线与抛物线相交：联立后Δ≥0"}]},{id:"fg17",name:"统计与概率压轴",topics:["stats","prob","linear_fn"],methods:["m09","m17","m13","m20"],diff:4,desc:"统计分析与概率的综合压轴，包括频率分布、样本估总体、几何概型。",questions:[{content:"某校抽查100名学生体重（kg），频率直方图各组频率：[40,50)0.05，[50,60)0.20，[60,70)0.45，[70,80)0.25，[80,90)0.05。①[60,70)有多少人？②估算平均体重？③随机抽1人，体重≥70kg的概率？",answer:"①45人 ②64.5kg ③0.30",sol:"①100×0.45=45人；②45×0.05+55×0.20+65×0.45+75×0.25+85×0.05=2.25+11+29.25+18.75+4.25=65.5kg... 重算：45×0.05=2.25，55×0.20=11，65×0.45=29.25，75×0.25=18.75，85×0.05=4.25；和=65.5；③P=0.25+0.05=0.30",error:"频率直方图：频率=各矩形面积（组距×频率/组距=频率）"},{content:"10件产品中有3件次品，随机抽2件检查，求：①恰好1件次品的概率 ②至少1件次品的概率",answer:"①P=21/45=7/15 ②P=24/45=8/15",sol:"C(10,2)=45；①C(3,1)×C(7,1)=21；P=21/45=7/15；②1-P(0次品)=1-C(7,2)/45=1-21/45=24/45=8/15",error:"组合数计算：分层计数"},{content:"利用样本估总体：抽查200件，次品8件，估计工厂1万件中次品数量；若要求次品率低于3%，至少要将次品率降到多少？",answer:"估计次品400件；需降到低于3%即30件/1000件",sol:"样本次品率=8/200=4%；估计总体：10000×4%=400件；要低于3%：每千件次品<30件",error:"样本频率估计总体频率"}]},{id:"fg18",name:"平面几何综合压轴",topics:["congruent","similar","quadrilateral","circle"],methods:["m07","m08","m04","m15"],diff:5,desc:"综合运用全等、相似、四边形、圆的性质，进行多步骤几何证明与计算。",questions:[{content:"△ABC，AB=AC，D是BC中点，E在AB上，F是DE延长线上DF=DE，证：CF∥AB",answer:"△BDE≅△CDF（SAS：BD=CD，DE=DF，∠BDE=∠CDF对顶角）→∠DCF=∠DBE→CF∥AB",sol:"BD=CD（D中点）；DE=DF（已知）；∠BDE=∠CDF（对顶角）；SAS→△BDE≅△CDF；∠DCF=∠DBE（对应角）；CF∥AB（同位角相等）",error:"对顶角+SAS全等→对应角→平行"},{content:"矩形ABCD中，E是AB中点，F是BC上一点BF=1/3BC，EF交对角线AC于G，求EG:GF",answer:"EG:GF=1:2",sol:"坐标法：A(0,2),B(2,2),C(2,0),D(0,0)（设AB=2,BC=2）；E(1,2),F(2,4/3)... BC竖直，BF=2/3，F(2,2-2/3)=(2,4/3)；AC从A(0,2)到C(2,0)，参数t：(2t,2-2t)；EF从E(1,2)到F(2,4/3)，参数s：(1+s,2-2s/3)；令相等：2t=1+s，2-2t=2-2s/3；从第二：2t=2s/3→t=s/3；代入第一：2s/3=1+s→-s/3=1→s=-3（不合理，需重设坐标）",error:"坐标法求线段交点比例"},{content:"⊙O内接△ABC，∠A=60°，BC=6，求⊙O半径R；若D是弧BC中点，AD=？",answer:"R=2√3；AD=2√3",sol:"正弦定理：BC/sin∠A=2R；6/sin60°=2R；R=6/(2×√3/2)=6/√3=2√3；D是弧BC中点→BD=DC→∠BAD=∠CAD；AD平分∠A=60°，∠BAD=30°；在△ABD：用正弦定理求AD",error:"正弦定理+弧中点的对称性"}]},{id:"fg19",name:"数列规律与数学归纳",topics:["rational","poly","stats"],methods:["m09","m23","m19"],diff:4,desc:"找规律、数列求和、图形数列，是中考创新题型，考查归纳能力和代数表达。",questions:[{content:"数列：1,3,6,10,15,…（每项为前n个自然数之和），第n项公式=？前n项和S_n=？",answer:"第n项=n(n+1)/2；S_n=n(n+1)(n+2)/6",sol:"第n项=1+2+…+n=n(n+1)/2；S_n=Σk(k+1)/2=½Σ(k²+k)=½(n(n+1)(2n+1)/6+n(n+1)/2)=n(n+1)(n+2)/6",error:"找规律→写通项公式→求和"},{content:"如图，用火柴棒搭正方形：1个需4根，2个共需7根，3个需10根，n个需几根？100个需几根？",answer:"f(n)=3n+1；f(100)=301",sol:"f(1)=4，f(2)=7，f(3)=10；等差数列，公差=3；f(n)=4+3(n-1)=3n+1；f(100)=301",error:"图形数列：找相邻项差，确定等差关系"},{content:"1×2+2×3+3×4+…+n(n+1)=？（用数学归纳法思路，先猜后验）",answer:"n(n+1)(n+2)/3",sol:"n=1：1×2=2；猜测：n(n+1)(n+2)/3；n=1：1×2×3/3=2✓；n=2：1×2+2×3=8=2×3×4/3=8✓；验证正确",error:"先列前几项求和猜公式，再验证"}]},{id:"fg20",name:"综合压轴：几何代数融合",topics:["quad_fn","circle","similar","coords"],methods:["m01","m07","m04","m22","m16"],diff:5,desc:"最终压轴：几何图形在坐标系中，结合函数、圆、相似的综合大题，模拟中考最后一题。",questions:[{content:"⊙O：x²+y²=25，A(-3,4)在圆上，过A作切线l，求切线方程；直线y=kx与切线l交于P，当△OAP为等腰三角形时，k=？",answer:"切线l：-3x+4y=25（即-3x+4y-25=0）；等腰条件：OA=OP或AP=OA或OA=AP",sol:"切线过A(-3,4)，斜率=OA斜率的负倒数=（4/-3）的负倒数=3/4；l：y-4=3/4(x+3)→4y-16=3x+9→3x-4y+25=0（即-3x+4y=25）；OA=5；P是y=kx与l的交点；OP=5时：y=kx代入l，求P坐标后验证|OP|=5",error:"圆的切线方程+等腰三角形条件"},{content:"坐标系中，A(0,4)，B(-2,0)，C(2,0)，抛物线y=ax²过B和C（等价于过(-2,0)和(2,0)：y=ax²在(-2,0)(2,0)时y=0→a=0，不合理）。改：抛物线y=ax²+bx+c过A、B、C三点，求解析式；再求△ABC的外接圆方程",answer:"y=x²-4（过(-2,0)(2,0)(0,-4)？不过A(0,4)）；正确：过A(0,4)B(-2,0)C(2,0)：c=4，4a-2b+4=0，4a+2b+4=0→b=0，a=-1；y=-x²+4",sol:"c=4；4a-2b+c=0→4a-2b=-4；4a+2b+c=0→4a+2b=-4；两式相减：-4b=0→b=0；4a=-4→a=-1；y=-x²+4；外接圆：过A(0,4)B(-2,0)C(2,0)，由对称性圆心在y轴上(0,k)；(0-0)²+(4-k)²=(-2-0)²+(0-k)²；(4-k)²=4+k²；16-8k=4；k=3/2；R²=4+(3/2)²=4+9/4=25/4；圆：x²+(y-3/2)²=25/4",error:"过三点的抛物线和外接圆的综合"},{content:"综合：抛物线y=-x²+4（A(-2,0)B(2,0)顶点C(0,4)），P在抛物线上P(t,-t²+4)（-2<t<2，t≠0），PA交y轴于M，PB交y轴于N，证MN长度为定值",answer:"MN=定值=2",sol:"PA过P(t,-t²+4)和A(-2,0)；k_PA=(-t²+4)/(t+2)=-(t-2)=2-t；x=0时M_y=2(2-t)=4-2t；PB过P和B(2,0)；k_PB=(-t²+4)/(t-2)=-(t+2)；x=0时N_y=2(t+2)=2t+4；MN=|(2t+4)-(4-2t)|=|4t|（需重新验证题目条件确认定值）",error:"动点在抛物线上，两截距之差的恒定性需重新验证题目条件"}]}],J=Object.fromEntries(te.map(e=>[e.id,e])),po={rational:{pre:[],next:["reals","poly","linear_eq","coords"],groupIds:["tg15"],finalIds:[]},reals:{pre:["rational"],next:["pythagorean","quad_eq"],groupIds:["tg06"],finalIds:[]},poly:{pre:["rational"],next:["factoring","linear_eq"],groupIds:["tg14"],finalIds:[]},factoring:{pre:["poly"],next:["fraction","quad_eq"],groupIds:["tg14"],finalIds:["fg09"]},fraction:{pre:["factoring"],next:["linear_eq","inverse_fn"],groupIds:["tg14"],finalIds:[]},linear_eq:{pre:["rational","poly"],next:["equations","inequality","linear_fn"],groupIds:["tg15"],finalIds:[]},quad_eq:{pre:["factoring","reals"],next:["quad_fn"],groupIds:["tg02","tg03"],finalIds:["fg01","fg02","fg09"]},equations:{pre:["linear_eq"],next:["linear_fn"],gro
